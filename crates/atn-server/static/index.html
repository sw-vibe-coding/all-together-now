<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Together Now</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
        header .agent-count { font-size: 13px; color: #888; }

        .dashboard { flex: 1; display: grid; gap: 8px; padding: 8px; min-height: 0; overflow: auto; }
        .dashboard.cols-1 { grid-template-columns: 1fr; }
        .dashboard.cols-2 { grid-template-columns: 1fr 1fr; }
        .dashboard.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .dashboard.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        /* Filter bar: text input + chips + group toggle + saved-layouts dropdown.
           Sits between the view tabs (in the main header) and the pin row. */
        .filter-bar { display: none; gap: 8px; padding: 6px 8px; border-bottom: 1px solid #0f3460; background: #16213e; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
        .filter-bar.visible { display: flex; }
        .filter-bar input#filter-input { flex: 0 1 240px; padding: 5px 10px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; outline: none; }
        .filter-bar input#filter-input:focus { border-color: #e94560; }
        .filter-bar .chip { padding: 3px 10px; font-size: 11px; border: 1px solid #0f3460; background: transparent; color: #888; border-radius: 12px; cursor: pointer; }
        .filter-bar .chip:hover { color: #c9d1d9; border-color: #1e3a5f; }
        .filter-bar .chip.active { background: #0f3460; color: #4ecca3; border-color: #4ecca3; }
        .filter-bar .group-section { display: flex; align-items: center; gap: 4px; }
        .filter-bar .group-section label { font-size: 11px; color: #888; }
        .filter-bar .group-section select { padding: 3px 6px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 11px; }
        .filter-bar .layouts-section { display: flex; align-items: center; gap: 4px; margin-left: auto; }
        .filter-bar .layouts-section select { padding: 3px 6px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 11px; min-width: 120px; }
        .filter-bar .layouts-section button { padding: 3px 10px; background: transparent; border: 1px solid #0f3460; border-radius: 4px; color: #888; cursor: pointer; font-size: 11px; }
        .filter-bar .layouts-section button:hover { color: #4ecca3; border-color: #4ecca3; }
        .filter-bar .filter-hint { font-size: 10px; color: #6b7280; margin-left: 4px; }
        .pin-cell.filtered .pin-name::after { content: ' (filtered)'; color: #6b7280; font-weight: 400; font-style: italic; }

        /* Group bands in the treemap — subtle borders around each role
           or project cluster. Applied to a positioned overlay rect. */
        .group-band { position: absolute; border: 1px dashed #2d3a63; border-radius: 4px; pointer-events: none; }
        .group-band .group-label { position: absolute; top: -8px; left: 8px; font-size: 10px; background: #16213e; color: #888; padding: 0 6px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* Pin row — horizontal strip above the dashboard showing agents the
           user has explicitly pinned. Pinned agents are excluded from the
           heat-sized treemap so their visible size stays stable. */
        .pin-row { display: none; gap: 6px; padding: 6px 8px 0; overflow-x: auto; flex-shrink: 0; }
        .pin-row.visible { display: flex; }
        .pin-cell { flex: 0 0 auto; width: 180px; height: 82px; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; padding: 6px 8px; display: flex; flex-direction: column; gap: 3px; cursor: pointer; position: relative; }
        .pin-cell:hover { border-color: #4ecca3; }
        .pin-cell .pin-head { display: flex; align-items: center; gap: 4px; font-size: 11px; min-width: 0; }
        .pin-cell .pin-name { font-weight: 600; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .pin-cell .pin-state { font-size: 10px; padding: 1px 5px; }
        .pin-cell .pin-body { display: flex; align-items: center; gap: 4px; min-width: 0; }
        .pin-cell .sparkline { flex-shrink: 0; width: 44px; height: 14px; }
        .pin-cell .sparkline path { fill: none; stroke: #4ecca3; stroke-width: 1.5; }
        .pin-cell .pin-lastline { flex: 1; min-width: 0; font-family: monospace; font-size: 9px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pin-cell .pin-unpin { position: absolute; top: 2px; right: 4px; font-size: 14px; color: #6b7280; cursor: pointer; line-height: 1; padding: 0 2px; background: transparent; border: none; }
        .pin-cell .pin-unpin:hover { color: #e94560; }
        .pin-cell .pin-icon { color: #fbbf24; flex-shrink: 0; font-size: 10px; }

        /* Tile action buttons injected into agent-header + compact-head. */
        .tile-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .tile-actions button { background: transparent; border: 1px solid #0f3460; color: #888; font-size: 11px; padding: 2px 6px; border-radius: 3px; cursor: pointer; }
        .tile-actions button:hover { background: #0f3460; color: #c9d1d9; }
        .tile-actions .btn-pin.pinned { color: #fbbf24; border-color: #fbbf24; }

        /* Treemap mode: dashboard becomes an absolutely-positioned canvas.
           Tiles get their inset from computeLayout(). Smooth transitions
           keep the layout from feeling jittery at the 1.5s refresh cadence. */
        .dashboard.treemap-mode { display: block; position: relative; overflow: hidden; padding: 4px; gap: 0; }
        /* No transitions on position/size — instant snaps read as less
           "zoomy" than animated changes when the treemap recomputes. */
        .dashboard.treemap-mode .agent-panel,
        .dashboard.treemap-mode .agent-compact {
            position: absolute;
            min-height: 0;
        }
        .dashboard.treemap-mode .agent-panel.focus { outline: 2px solid #e94560; outline-offset: -2px; }

        /* Selected window (click on a header) — accent outline so the
           user can see which window will receive bare-key commands in
           step 5. Distinct from the step-3 .focus outline which was
           auto-picked; this one is explicitly click-driven. */
        .dashboard.treemap-mode .agent-panel.selected { outline: 2px solid #4ecca3; outline-offset: -2px; }

        /* Per-window chrome icon buttons (header right side). */
        .agent-header .tile-actions .btn-icon {
            background: transparent; border: 1px solid transparent;
            color: #888; font-size: 12px; padding: 1px 5px; line-height: 1;
            border-radius: 3px; cursor: pointer; min-width: 22px; text-align: center;
        }
        .agent-header .tile-actions .btn-icon:hover { background: #0f3460; color: #c9d1d9; border-color: #0f3460; }
        .agent-header .tile-actions .btn-pin.pinned { color: #fbbf24; border-color: #fbbf24; }
        .agent-header .tile-actions .btn-delete:hover { color: #fca5a5; border-color: #7f1d1d; background: #7f1d1d; }

        /* Bottom dock — strip of minimized windows at the bottom of
           the dashboard area, always visible when any window is
           minimized. */
        .window-dock { display: none; gap: 6px; padding: 6px 8px; border-top: 1px solid #0f3460; background: #16213e; overflow-x: auto; flex-shrink: 0; }
        .window-dock.visible { display: flex; }
        .dock-cell { flex: 0 0 auto; width: 180px; height: 48px; border: 1px solid #0f3460; border-radius: 4px; background: #0d1117; padding: 4px 8px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; position: relative; overflow: hidden; }
        .dock-cell:hover { border-color: #4ecca3; }
        .dock-cell .dock-head { display: flex; align-items: center; gap: 4px; font-size: 11px; min-width: 0; }
        .dock-cell .dock-name { font-weight: 600; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .dock-cell .dock-role { font-size: 9px; color: #888; text-transform: uppercase; flex-shrink: 0; }
        .dock-cell .dock-state { font-size: 9px; padding: 1px 4px; }
        .dock-cell .dock-last { font-family: monospace; font-size: 9px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .agent-panel { display: flex; flex-direction: column; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; min-height: 300px; overflow: auto; }
        .agent-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        .agent-header .agent-name { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        .agent-header .agent-role { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .agent-header .spacer { flex: 1; }

        .state-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
        .state-starting    { background: #1f2937; color: #9ca3af; }
        .state-running     { background: #064e3b; color: #34d399; }
        .state-idle        { background: #1e3a5f; color: #60a5fa; }
        .state-awaiting_human_input { background: #78350f; color: #fbbf24; }
        .state-busy        { background: #4c1d95; color: #a78bfa; }
        .state-blocked     { background: #7f1d1d; color: #fca5a5; }
        .state-completed_task { background: #064e3b; color: #6ee7b7; }
        .state-error       { background: #7f1d1d; color: #f87171; }
        .state-disconnected { background: #1f2937; color: #6b7280; }

        .agent-terminal { flex: 1; min-height: 0; background: #0d1117; cursor: text; overflow: hidden; position: relative; }
        .agent-terminal:focus-within { outline: 1px solid #e94560; outline-offset: -1px; }
        /* Visual scaler around xterm. xterm always renders at native rows*cols
           (no fit-addon after spawn); this wrapper applies a discrete
           scale so tile size changes are pure DOM work and the PTY never
           sees layout churn. */
        .term-scale { position: absolute; top: 0; left: 0; transform-origin: top left; transform: scale(var(--term-k, 1)); }
        .agent-controls { display: flex; gap: 6px; padding: 6px 8px; align-items: center; border-top: 1px solid #0f3460; flex-shrink: 0; }
        .agent-controls input { flex: 1; padding: 6px 10px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 13px; outline: none; }
        .agent-controls input:focus { border-color: #e94560; }
        .agent-controls button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-send { background: #4ecca3; color: #1a1a2e; }
        .btn-send:hover { background: #3db892; }
        .btn-ctrl-c { background: #e94560; color: #fff; font-size: 11px; padding: 6px 8px; }
        .btn-ctrl-c:hover { background: #d63851; }

        .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .conn-dot.connected { background: #4ecca3; }
        .conn-dot.disconnected { background: #e94560; }

        /* Compact tile — replaces an xterm panel when allotted space is
           too small for xterm to be readable. No xterm DOM inside; cheap
           to render many of these at once. */
        .agent-compact { display: flex; flex-direction: column; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; overflow: hidden; cursor: pointer; min-height: 54px; padding: 6px 8px; gap: 4px; }
        .agent-compact:hover { border-color: #4ecca3; }
        .agent-compact .compact-head { display: flex; align-items: center; gap: 6px; font-size: 12px; min-width: 0; }
        .agent-compact .compact-name { font-weight: 600; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-compact .compact-role { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; }
        .agent-compact .compact-spacer { flex: 1; }
        .agent-compact .state-badge { font-size: 10px; padding: 1px 6px; }
        .agent-compact .compact-body { display: flex; align-items: center; gap: 6px; min-width: 0; }
        .agent-compact .sparkline { flex-shrink: 0; width: 60px; height: 18px; }
        .agent-compact .sparkline path { fill: none; stroke: #4ecca3; stroke-width: 1.5; }
        .agent-compact .last-line { flex: 1; min-width: 0; font-family: monospace; font-size: 10px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-compact .focus-hint { font-size: 9px; color: #4ecca3; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .agent-compact:hover .focus-hint { opacity: 1; }

        /* View tabs */
        .view-tabs { display: flex; gap: 4px; margin-left: auto; }
        .view-tab { padding: 4px 12px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #888; cursor: pointer; font-size: 12px; }
        .view-tab.active { background: #0f3460; color: #e0e0e0; }
        .view-tab:hover { color: #e0e0e0; }

        /* Wiki browser */
        .wiki-container { flex: 1; display: flex; min-height: 0; overflow: hidden; }
        .wiki-sidebar { width: 220px; border-right: 1px solid #0f3460; overflow-y: auto; padding: 8px 0; flex-shrink: 0; }
        .wiki-sidebar h3 { font-size: 12px; color: #888; padding: 4px 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .wiki-page-item { padding: 6px 12px; cursor: pointer; font-size: 13px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wiki-page-item:hover { background: #1e3a5f; }
        .wiki-page-item.active { background: #0f3460; color: #e94560; }
        .wiki-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .wiki-toolbar { padding: 8px 12px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .wiki-toolbar .page-title { font-size: 14px; font-weight: 600; color: #c9d1d9; flex: 1; }
        .wiki-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .wiki-toolbar button:hover { background: #0f3460; }
        .wiki-toolbar button.btn-save { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; }
        .wiki-toolbar button.btn-save:hover { background: #3db892; }
        .wiki-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .wiki-content h1, .wiki-content h2, .wiki-content h3 { color: #c9d1d9; margin: 16px 0 8px; }
        .wiki-content h1 { font-size: 22px; border-bottom: 1px solid #0f3460; padding-bottom: 6px; }
        .wiki-content h2 { font-size: 18px; }
        .wiki-content p { margin: 8px 0; line-height: 1.6; }
        .wiki-content ul, .wiki-content ol { margin: 8px 0; padding-left: 24px; }
        .wiki-content a.wiki-link { color: #4ecca3; text-decoration: none; cursor: pointer; }
        .wiki-content a.wiki-link:hover { text-decoration: underline; }
        .wiki-edit-area { flex: 1; display: flex; flex-direction: column; padding: 8px; min-height: 0; }
        .wiki-edit-area textarea { flex: 1; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 12px; resize: none; outline: none; }
        .wiki-edit-area textarea:focus { border-color: #e94560; }
        .wiki-conflict { background: #7f1d1d; border: 1px solid #f87171; border-radius: 4px; padding: 10px 14px; margin: 8px; color: #fca5a5; font-size: 13px; }
        .wiki-new-page { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #0f3460; }
        .wiki-new-page input { flex: 1; padding: 4px 8px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; outline: none; }
        .wiki-new-page button { padding: 4px 10px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Events log */
        .events-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }
        .events-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; flex-shrink: 0; }
        .events-toolbar h2 { font-size: 16px; color: #c9d1d9; flex: 1; }
        .events-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .events-toolbar button:hover { background: #0f3460; }
        .events-columns { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-height: 0; overflow: hidden; }
        .events-column { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .events-column-header { font-size: 13px; font-weight: 600; color: #c9d1d9; padding: 6px 10px; background: #16213e; border: 1px solid #0f3460; border-radius: 6px 6px 0 0; flex-shrink: 0; }
        .events-column-header .col-arrow { margin: 0 4px; color: #e94560; }
        .events-list { flex: 1; overflow-y: auto; }
        .event-card { border: 1px solid #0f3460; border-radius: 6px; background: #16213e; padding: 10px 14px; margin-bottom: 6px; }
        .event-card .event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .event-card .event-kind { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .kind-feature_request { background: #1e3a5f; color: #60a5fa; }
        .kind-bug_fix_request { background: #7f1d1d; color: #fca5a5; }
        .kind-completion_notice { background: #064e3b; color: #6ee7b7; }
        .kind-blocked_notice { background: #78350f; color: #fbbf24; }
        .kind-needs_info { background: #4c1d95; color: #a78bfa; }
        .kind-verification_request { background: #064e3b; color: #34d399; }
        .event-card .event-summary { font-size: 13px; color: #e0e0e0; }
        .event-card .event-meta { font-size: 11px; color: #888; margin-top: 4px; display: flex; gap: 12px; }
        .event-card .event-decision { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .decision-deliver { background: #064e3b; color: #34d399; }
        .decision-escalate { background: #7f1d1d; color: #fca5a5; }
        .decision-broadcast { background: #1e3a5f; color: #60a5fa; }
        .escalation-banner { background: #7f1d1d; border: 1px solid #f87171; border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; color: #fca5a5; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .escalation-banner .esc-icon { font-size: 18px; }

        /* Saga view */
        .saga-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }
        .saga-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; flex-shrink: 0; }
        .saga-toolbar h2 { font-size: 16px; color: #c9d1d9; flex: 1; }
        .saga-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .saga-toolbar button:hover { background: #0f3460; }
        .saga-toolbar .btn-distill { background: #4c1d95; color: #a78bfa; border-color: #4c1d95; }
        .saga-toolbar .btn-distill:hover { background: #5b21b6; }
        .saga-grid { flex: 1; display: grid; gap: 8px; min-height: 0; overflow: auto; }
        .saga-grid.saga-cols-1 { grid-template-columns: 1fr; }
        .saga-grid.saga-cols-2 { grid-template-columns: 1fr 1fr; }
        .saga-grid.saga-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .saga-grid.saga-cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .saga-panel { display: flex; flex-direction: column; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; min-height: 0; overflow: hidden; }
        .saga-panel-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        .saga-panel-header .saga-agent-name { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        .saga-panel-header .saga-agent-role { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .saga-panel-header .spacer { flex: 1; }
        .saga-panel-header .saga-status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .saga-panel-header .saga-active { background: #064e3b; color: #34d399; }
        .saga-panel-header .saga-completed { background: #1e3a5f; color: #60a5fa; }
        .saga-panel-body { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 8px; }
        .saga-info { display: flex; gap: 12px; padding: 0 0 8px; flex-shrink: 0; flex-wrap: wrap; }
        .saga-info .saga-stat { background: #0d1117; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 10px; }
        .saga-info .saga-stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .saga-info .saga-stat-value { font-size: 14px; color: #c9d1d9; font-weight: 600; }
        .saga-steps { flex: 1; overflow-y: auto; padding: 4px 0; }
        .step-card { border: 1px solid #0f3460; border-radius: 6px; background: #0d1117; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 12px; }
        .step-card.step-current { border-color: #e94560; background: #1e1a2e; }
        .step-number { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
        .step-pending .step-number { background: #1f2937; color: #6b7280; }
        .step-in-progress .step-number { background: #4c1d95; color: #a78bfa; }
        .step-completed .step-number { background: #064e3b; color: #6ee7b7; }
        .step-blocked .step-number { background: #7f1d1d; color: #fca5a5; }

        /* New agent form */
        .new-agent-bar { padding: 8px; border-bottom: 1px solid #0f3460; background: #16213e; flex-shrink: 0; display: none; }

        .new-agent-form .field-name { width: 140px; }
        .new-agent-form .field-host { width: 120px; }

        .new-agent-form .field-project { width: 120px; }

        .new-agent-form .field-label { color:#888; font-size:11px; margin-right:2px; }
        .new-agent-form .field-err { color:#fca5a5; font-size:11px; }

        /* Agent config editor overlay */

        .agent-config-editor.visible { display: block; }

        .agent-config-editor input, .agent-config-editor select { width: 100%; padding: 4px 6px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 3px; color: #e0e0e0; font-size: 12px; outline: none; margin-top: 2px; }
        .agent-config-editor .cfg-btns { display: flex; gap: 6px; margin-top: 6px; }

        /* Dependency graph */
        .graph-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }

        <div class="events-columns">

                <div class="events-column-header">Coordinator <span class="col-arrow">&rarr;</span> Agents</div>
                <div class="events-list" id="events-outbound"></div>
            </div>
            <div class="events-column">
                <div class="events-column-header">Agents <span class="col-arrow">&rarr;</span> Coordinator</div>
                <div class="events-list" id="events-inbound"></div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script>
        const API_BASE = '';
        const agents = new Map(); // id -> { term, fitAddon, evtSource, panel, heatRing, lastLine, mode }

        // --- Compact-tile state ---
        //
        // Each agent records:
        //   heatRing: rolling bytes_per_sec samples (most recent last, 60-long)
        //   lastLine: most recent fully-terminated line of PTY output (<=200 chars)
        //   mode:     'xterm' | 'compact' — step 4 will pick this by tile size.
        //
        // The compact tile reads both; it does NOT embed an xterm.

        const HEAT_RING_LEN = 60;

        function ensureAgentMeta(id) {
            const a = agents.get(id);
            if (!a) return null;
            if (!a.heatRing) a.heatRing = new Array(HEAT_RING_LEN).fill(0);
            if (!a.lastLine) a.lastLine = '';
            if (!a.mode) a.mode = 'xterm';
            return a;
        }

        function recordOutputBytes(id, bytes) {
            const a = ensureAgentMeta(id);
            if (!a) return;
            // Append a plain-text-ish suffix to the last-line buffer, strip
            // common ANSI control-sequence envelopes so the preview is
            // readable. Keep ≤200 chars.
            let txt = '';
            for (let i = 0; i < bytes.length; i++) {
                const c = bytes[i];
                if (c === 0x0a) txt += '\n';
                else if (c === 0x0d) {} // ignore CR alone
                else if (c === 0x1b) {
                    // Skip CSI: ESC [ params letter
                    i++;
                    if (bytes[i] === 0x5b /* '[' */) {
                        while (i < bytes.length && bytes[i] < 0x40) i++;
                    }
                    // else: skip just the escape byte
                } else if (c >= 0x20 && c < 0x7f) {
                    txt += String.fromCharCode(c);
                }
            }
            const buf = (a.lastLine + txt).slice(-400);
            const lines = buf.split('\n').filter(l => l.trim().length > 0);
            a.lastLine = (lines.length ? lines[lines.length - 1] : buf).slice(-200);
        }

        async function pollHeat() {
            try {
                const res = await fetch(`${API_BASE}/api/agents/heat`);
                if (!res.ok) return;
                const list = await res.json();
                const summary = {};
                for (const h of list) {
                    const a = ensureAgentMeta(h.id);
                    if (!a) continue;
                    a.heatRing.push(h.bytes_per_sec);
                    a.heatRing.shift();
                    a.currentHeat = h.heat;
                    a.currentBps = h.bytes_per_sec;
                    // Feed the layout's smoothed-heat EWMA so treemap tile
                    // sizes don't jitter on tiny byte bursts.
                    updateSmoothedHeat(h.id, h.heat);
                    refreshCompactIfPresent(h.id);
                    summary[h.id] = h.heat.toFixed(3);
                }
                atnDebug.log('heat:poll', summary);
            } catch (_) { /* transient network; next tick retries */ }
        }

        function startHeatPolling() {
            pollHeat();
            setInterval(pollHeat, 1000);
        }

        function sparklinePath(ring, w, h) {
            if (!ring || ring.length === 0) return '';
            const max = Math.max(1, ...ring);
            const dx = w / Math.max(1, ring.length - 1);
            let d = '';
            for (let i = 0; i < ring.length; i++) {
                const x = (i * dx).toFixed(1);
                const y = (h - (ring[i] / max) * h).toFixed(1);
                d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
            }
            return d.trim();
        }

        function createCompactTile(agent) {
            const tile = document.createElement('div');
            tile.className = 'agent-compact';
            tile.id = `compact-${agent.id}`;
            tile.dataset.agentId = agent.id;
            const sk = stateKey(agent.state);
            tile.innerHTML = `
                <div class="compact-head">
                    <span class="compact-name">${agent.name}</span>
                    <span class="compact-role">${agent.role}</span>
                    <span class="compact-spacer"></span>
                    <span class="state-badge state-${sk}" id="compact-badge-${agent.id}">${stateLabel(agent.state)}</span>
                </div>
                <div class="compact-body">
                    <svg class="sparkline" viewBox="0 0 60 18" preserveAspectRatio="none">
                        <path d="" id="compact-spark-${agent.id}"></path>
                    </svg>
                    <span class="last-line" id="compact-lastline-${agent.id}">&nbsp;</span>
                    <span class="focus-hint">click to focus ▸</span>
                </div>
            `;
            tile.addEventListener('click', () => {
                const evt = new CustomEvent('swap-to-focus', {
                    detail: { agentId: agent.id },
                    bubbles: true,
                });
                tile.dispatchEvent(evt);
            });
            return tile;
        }

        function refreshCompactIfPresent(agentId) {
            const tile = document.getElementById(`compact-${agentId}`);
            if (tile) {
                const a = agents.get(agentId);
                if (a) {
                    const pathEl = tile.querySelector(`#compact-spark-${agentId}`);
                    if (pathEl) pathEl.setAttribute('d', sparklinePath(a.heatRing, 60, 18));
                    const lastEl = tile.querySelector(`#compact-lastline-${agentId}`);
                    if (lastEl) lastEl.textContent = a.lastLine || ' ';
                }
            }
            // Pin cells show the same live data when the agent is pinned.
            if (typeof refreshPinCell === 'function') refreshPinCell(agentId);
        }

        // Manual toggle for developer testing before step 4 picks the mode
        // by tile size. Swaps a full panel in/out for its compact tile.
        function toggleCompactMode(agentId) {
            const a = agents.get(agentId);
            if (!a) return;
            const current = document.getElementById(`panel-${agentId}`)
                || document.getElementById(`compact-${agentId}`);
            if (!current) return;
            const dashboard = document.getElementById('dashboard');
            if (a.mode === 'xterm') {
                const compact = createCompactTile({
                    id: agentId,
                    name: a.panel?.querySelector('.agent-name')?.textContent || agentId,
                    role: a.panel?.querySelector('.agent-role')?.textContent || 'agent',
                    state: { state: 'idle' },
                });
                dashboard.replaceChild(compact, current);
                a.mode = 'compact';
                refreshCompactIfPresent(agentId);
            } else {
                if (a.panel) dashboard.replaceChild(a.panel, current);
                a.mode = 'xterm';
            }
        }

        // --- Window state + header-click + chrome button dispatch ---
        //
        // Click model (option C from the saga design):
        //   - Clicking a window's header selects it (accent outline).
        //     Bare-key shortcuts (step 5) will act on the selected window.
        //   - Clicking an icon button in the header fires its action.
        //   - Clicking inside the xterm body puts focus there; all keys
        //     route to the PTY as usual.
        //   - Clicking an empty area of the dashboard or pressing Esc
        //     (step 5) deselects and restores any maximized window.

        function windowSelect(id) {
            layoutState.selectedId = id;
            document.querySelectorAll('.agent-panel.selected').forEach((el) => {
                el.classList.remove('selected');
            });
            if (id) {
                const el = document.getElementById(`panel-${id}`);
                if (el) el.classList.add('selected');
                // Selected tile gets a crisp xterm at its real size.
                fitSelectedTerm(id);
            }
        }

        function fitSelectedTerm(id) {
            const a = agents.get(id);
            if (!a || !a.fitAddon) return;
            try {
                a.fitAddon.fit();
                syncPtySize(id, a.term);
            } catch (_) { /* xterm not rendered yet */ }
        }

        function windowMinimize(id) {
            ensureWindow(id).state = 'minimized';
            if (layoutState.selectedId === id) layoutState.selectedId = null;
            saveLayoutPrefs();
            applyLayoutFresh();
        }

        function windowMaximizeToggle(id) {
            const w = ensureWindow(id);
            if (w.state === 'maximized') {
                w.state = 'normal';
            } else {
                // Only one maximized window at a time — restore any existing.
                for (const other of agents.keys()) {
                    const ow = layoutState.windows[other];
                    if (ow && ow.state === 'maximized') ow.state = 'normal';
                }
                w.state = 'maximized';
                layoutState.selectedId = id;
            }
            saveLayoutPrefs();
            applyLayoutFresh();
        }

        function windowRestore(id) {
            ensureWindow(id).state = 'normal';
            saveLayoutPrefs();
            applyLayoutFresh();
        }

        function applyLayoutFresh() {
            const dashboard = document.getElementById('dashboard');
            if (!dashboard) return;
            applyLayout(computeLayout(dashboard));
        }

        function confirmDelete(id) {
            if (!confirm(`Delete agent '${id}'? This cannot be undone.`)) return;
            fetch(`${API_BASE}/api/agents/${id}`, { method: 'DELETE' })
                .then(() => {
                    const a = agents.get(id);
                    if (a && a.evtSource) a.evtSource.close();
                    if (a && a.panel) a.panel.remove();
                    agents.delete(id);
                    delete layoutState.windows[id];
                    if (layoutState.selectedId === id) layoutState.selectedId = null;
                    applyLayoutFresh();
                    refreshDashboardLayout();
                });
        }

        function reconnectAgent(id) {
            fetch(`${API_BASE}/api/agents/${id}/reconnect`, { method: 'POST' })
                .then((res) => {
                    if (!res.ok) return;
                    const a = agents.get(id);
                    if (a && a.evtSource) a.evtSource.close();
                    setTimeout(() => connectSSE(id), 1000);
                });
        }

        // Single delegated click listener for everything inside an
        // agent panel's header: icon buttons + header body click.
        document.addEventListener('click', (e) => {
            // Dock cell clicks restore the agent.
            const dockCell = e.target.closest('.dock-cell[data-window-id]');
            if (dockCell) {
                windowRestore(dockCell.getAttribute('data-window-id'));
                return;
            }
            // Chrome icon buttons on a window header.
            const iconBtn = e.target.closest('.btn-icon[data-window-action][data-window-id]');
            if (iconBtn) {
                const id = iconBtn.getAttribute('data-window-id');
                const action = iconBtn.getAttribute('data-window-action');
                e.stopPropagation();
                switch (action) {
                    case 'minimize': windowMinimize(id); break;
                    case 'maximize': windowMaximizeToggle(id); break;
                    case 'pin':      togglePin(id); break;
                    case 'config':   toggleConfig(id); break;
                    case 'reconnect': reconnectAgent(id); break;
                    case 'delete':   confirmDelete(id); break;
                }
                return;
            }
            // Clicking inside tile-actions bubble-catcher but not a button —
            // do nothing (don't propagate to the select-on-header handler).
            if (e.target.closest('[data-no-focus]')) return;
            // Otherwise clicking a window header = select that window.
            const hdr = e.target.closest('.agent-header[data-window-id]');
            if (hdr) {
                windowSelect(hdr.getAttribute('data-window-id'));
            }
        });

        // --- Keyboard shortcuts ---
        //
        // 1..9  focus Nth hottest (unpinned) agent
        // 0     focus coordinator if one exists
        // f     toggle focus panel width (medium ↔ large)
        // p     pin/unpin the currently focused agent
        // /     step 6 hook — focuses the filter input when it exists
        // Esc   clear explicit focus; auto-pick takes over
        //
        // Ignores events when the user is typing into an input, textarea,
        // select, or anything inside an xterm (contenteditable via xterm).

        function isTypingTarget(t) {
            if (!t) return false;
            const tag = (t.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
            if (t.isContentEditable) return true;
            if (t.closest && t.closest('.xterm')) return true;
            return false;
        }

        function hottestUnpinned(n) {
            return buildLayoutItems()
                .sort((a, b) => b.value - a.value)
                .slice(0, n);
        }

        document.addEventListener('keydown', (e) => {
            if (isTypingTarget(e.target)) return;
            if (e.metaKey || e.ctrlKey || e.altKey) return;
            const k = e.key;

            if (k >= '1' && k <= '9') {
                const n = parseInt(k, 10);
                const hot = hottestUnpinned(n);
                if (hot.length >= n) {
                    e.preventDefault();
                    document.dispatchEvent(new CustomEvent('swap-to-focus', {
                        detail: { agentId: hot[n - 1].id },
                    }));
                }
                return;
            }
            if (k === '0') {
                const coord = Array.from(agents.entries()).find(([id, a]) => {
                    if (layoutState.pins.has(id)) return false;
                    const role = a?.panel?.querySelector?.('.agent-role')?.textContent?.toLowerCase() || '';
                    return role === 'coordinator';
                });
                if (coord) {
                    e.preventDefault();
                    document.dispatchEvent(new CustomEvent('swap-to-focus', {
                        detail: { agentId: coord[0] },
                    }));
                }
                return;
            }
            if (k === 'f') {
                e.preventDefault();
                layoutState.focusSize = layoutState.focusSize === 'medium' ? 'large' : 'medium';
                saveLayoutPrefs();
                const dashboard = document.getElementById('dashboard');
                if (dashboard && layoutState.enabled) {
                    applyLayout(computeLayout(dashboard));
                }
                return;
            }
            if (k === 'p') {
                if (layoutState.focusId) {
                    e.preventDefault();
                    togglePin(layoutState.focusId);
                }
                return;
            }
            if (k === '/') {
                // Step 6 will wire a real filter input. For now, focus
                // whatever `#filter-input` exists or just log.
                const input = document.getElementById('filter-input');
                if (input) {
                    e.preventDefault();
                    input.focus();
                } else {
                    console.log('filter input not yet available (step 6)');
                }
                return;
            }
            if (k === 'Escape') {
                if (layoutState.focusId !== null) {
                    e.preventDefault();
                    layoutState.focusId = null;
                    saveLayoutPrefs();
                    const dashboard = document.getElementById('dashboard');
                    if (dashboard && layoutState.enabled) {
                        applyLayout(computeLayout(dashboard));
                    }
                }
                return;
            }
        });

        // swap-to-focus: promote the clicked tile to the focus panel.
        // Freezes layout refreshes for a moment so the user's click
        // isn't immediately overwritten by the heat poll's re-layout.
        document.addEventListener('swap-to-focus', (e) => {
            const id = e.detail && e.detail.agentId;
            if (!id || !agents.has(id)) return;
            layoutState.focusId = id;
            layoutState.freezeUntil = Date.now() + LAYOUT_FREEZE_MS;
            saveLayoutPrefs();
            const dashboard = document.getElementById('dashboard');
            if (dashboard && layoutState.enabled) {
                applyLayout(computeLayout(dashboard));
            }
            // setFocus handles the PTY-resize + xterm fit so the focused
            // tile is crisp at its new geometry.
            setFocus(id);
        });

        // --- CSS-scaled xterm layout ---
        //
        // xterm renders at fixed native geometry (TERM_NATIVE_COLS x
        // TERM_NATIVE_ROWS). Each panel's `.term-scale` wrapper applies a
        // discrete CSS transform so the tile's visible size tracks the
        // allotted space without touching xterm or the PTY.
        //
        // TILE_SCALES are snap points chosen to keep monospace text crisp
        // (integer or near-integer pixel steps feel much better than
        // continuous scaling). Below COMPACT_THRESHOLD the tile drops to
        // the compact-tile variant from step 2 instead of showing an
        // unreadable xterm.

        // Native xterm geometry — referenced by the scale picker below and
        // by initTerminal further down. Declared here so both sites see it
        // without hitting a temporal-dead-zone error at load time.
        const TERM_NATIVE_COLS = 120;
        const TERM_NATIVE_ROWS = 40;

        const TILE_SCALES = [0.25, 0.33, 0.5, 0.66, 0.8, 1.0];
        const COMPACT_THRESHOLD = 0.25;

        // Rough native pixel size of a 120x40 xterm at 13 px font. Not
        // pixel-perfect — xterm internally picks cell width from the
        // rendered font — but good enough for scale selection. The live
        // measurement below refines it once xterm has rendered.
        const TERM_NATIVE_W_DEFAULT = TERM_NATIVE_COLS * 8; // ~960 px
        const TERM_NATIVE_H_DEFAULT = TERM_NATIVE_ROWS * 17; // ~680 px

        /**
         * Pick a discrete scale that fits a natW x natH box into a
         * tileW x tileH box. Returns the largest value in TILE_SCALES
         * that still fits, or null if nothing at or above
         * COMPACT_THRESHOLD does (caller should switch to compact mode).
         *
         * Hysteresis is gone — with the step-1 windowed layout, tile
         * sizes are stable across Refresh / resize events, so nothing
         * oscillates between snap points.
         */
        function pickTermScale(tileW, tileH, natW, natH) {
            if (!(tileW > 0) || !(tileH > 0) || !(natW > 0) || !(natH > 0)) {
                return null;
            }
            const raw = Math.min(tileW / natW, tileH / natH);
            if (raw < COMPACT_THRESHOLD) return null;
            let chosen = TILE_SCALES[0];
            for (const s of TILE_SCALES) {
                if (s <= raw) chosen = s;
            }
            return chosen;
        }

        /**
         * "Native" xterm dimensions used by the scale picker.
         *
         * Returns the per-agent measurement captured by initTerminal
         * BEFORE any `.term-scale` transform was applied. That's the
         * only safe reference — measuring a live (already-scaled) xterm
         * creates a positive-feedback loop where each Refresh flips the
         * tile between snap points (visually: "Open Code" → "Open C" →
         * "Op"). Falls back to the rough constants if the agent entry
         * is missing a measurement (shouldn't happen in practice).
         */
        function nativeTermSize(agentId) {
            const a = agents.get(agentId);
            if (a && a.nativeW && a.nativeH) {
                return { w: a.nativeW, h: a.nativeH };
            }
            return { w: TERM_NATIVE_W_DEFAULT, h: TERM_NATIVE_H_DEFAULT };
        }

        /**
         * Walk every mounted xterm panel, compute its tile scale from the
         * `.agent-terminal` host's current size, and either set a CSS
         * scale (xterm mode) or flip the tile to compact (below threshold).
         *
         * Pure DOM — no fit-addon, no PTY resize. The focus agent (set via
         * setFocus) is exempt: it stays at scale 1.0 and is the only tile
         * that can trigger a PTY-side resize.
         */
        function updateTileScales() {
            for (const [id, a] of agents.entries()) {
                if (a.mode !== 'xterm') continue;
                if (id === currentFocusId) {
                    const scaleEl = document.getElementById(`term-scale-${id}`);
                    if (scaleEl) scaleEl.style.setProperty('--term-k', '1');
                    continue;
                }
                const host = document.getElementById(`term-tile-${id}`);
                const scaleEl = document.getElementById(`term-scale-${id}`);
                if (!host || !scaleEl) continue;
                const hostRect = host.getBoundingClientRect();
                const { w: natW, h: natH } = nativeTermSize(id);
                const k = pickTermScale(hostRect.width, hostRect.height, natW, natH);
                if (k === null) {
                    // Too small for xterm — drop to compact automatically.
                    toggleCompactMode(id);
                } else {
                    scaleEl.style.setProperty('--term-k', String(k));
                }
            }
        }

        /**
         * Promote an agent to the focus slot. Only the focus tile gets a
         * real fit-addon resize + PTY size sync. Step 4 will drive this
         * from click events.
         */
        let currentFocusId = null;
        function setFocus(agentId) {
            currentFocusId = agentId;
            const a = agents.get(agentId);
            if (!a || !a.fitAddon) return;
            // Reset this tile's scale and fit xterm to its container.
            const scaleEl = document.getElementById(`term-scale-${agentId}`);
            if (scaleEl) scaleEl.style.setProperty('--term-k', '1');
            try {
                a.fitAddon.fit();
                syncPtySize(agentId, a.term);
            } catch (_) { /* xterm not rendered yet; next call will work */ }
            updateTileScales();
        }

        // --- pickTermScale self-test ---
        //
        // No JS test framework in the project, so the test runs on load
        // and logs PASS/FAIL to the console. Touchpoints: result values,
        // below-threshold → null, degenerate dims → null.
        (function testPickTermScale() {
            const cases = [
                { in: [960, 680, 960, 680], want: 1.0, desc: 'exact native fit' },
                { in: [480, 340, 960, 680], want: 0.5, desc: 'half-scale tile' },
                { in: [400, 300, 960, 680], want: 0.33, desc: 'between 0.33 and 0.5 → 0.33' },
                { in: [800, 600, 960, 680], want: 0.8, desc: 'just under 1.0' },
                { in: [2000, 1500, 960, 680], want: 1.0, desc: 'caps at 1.0 even with headroom' },
                { in: [200, 100, 960, 680], want: null, desc: 'below 0.25 threshold → null' },
                { in: [0, 100, 960, 680], want: null, desc: 'zero-width → null' },
                { in: [500, 500, 0, 680], want: null, desc: 'zero-native → null' },
            ];
            let fails = 0;
            for (const c of cases) {
                const got = pickTermScale(...c.in);
                if (got !== c.want) {
                    console.error(`pickTermScale FAIL: ${c.desc}: expected ${c.want}, got ${got}`);
                    fails++;
                }
            }
            if (fails === 0) {
                console.log('pickTermScale: %d cases PASS', cases.length);
            } else {
                console.error(`pickTermScale: ${fails}/${cases.length} FAIL`);
            }
        })();

        // --- Treemap layout ---
        //
        // Classic squarified treemap (Bruls / Huijsen / van Wijk 2000).
        // Input: a free rect + a list of positive values pre-sorted
        // descending. Output: per-item {x, y, w, h}. The algorithm greedily
        // lays out a "row" along the shorter axis, adding items while aspect
        // ratio improves, then recurses on the remaining rect.
        //
        // We feed it a list derived from each agent's smoothed heat score
        // every ~1.5 s. Focus agent is carved out first and gets its own
        // large rect (40–55% of viewport width).

        function worstRatio(rowValues, sumRow, shortSide) {
            // Aspect ratio of the worst (largest-ratio) tile in `rowValues`
            // if packed across `shortSide`. Smaller is squarer (1 = ideal).
            let rmin = Infinity, rmax = -Infinity;
            for (const v of rowValues) {
                if (v < rmin) rmin = v;
                if (v > rmax) rmax = v;
            }
            const s2 = shortSide * shortSide;
            const sum2 = sumRow * sumRow;
            return Math.max((s2 * rmax) / sum2, sum2 / (s2 * rmin));
        }

        function layoutRow(row, rect) {
            // Rows are always placed along the shorter axis of `rect`:
            // short-axis = h → row is a vertical strip on the left.
            // short-axis = w → row is a horizontal strip on top.
            // Returns { placed: [{id, x, y, w, h}], remaining: rect }.
            const sum = row.reduce((a, b) => a + b.value, 0);
            const out = [];
            if (rect.h <= rect.w) {
                const w = sum / rect.h;
                let y = rect.y;
                for (const it of row) {
                    const h = it.value / w;
                    out.push({ id: it.id, x: rect.x, y, w, h });
                    y += h;
                }
                return {
                    placed: out,
                    remaining: { x: rect.x + w, y: rect.y, w: rect.w - w, h: rect.h },
                };
            } else {
                const h = sum / rect.w;
                let x = rect.x;
                for (const it of row) {
                    const w = it.value / h;
                    out.push({ id: it.id, x, y: rect.y, w, h });
                    x += w;
                }
                return {
                    placed: out,
                    remaining: { x: rect.x, y: rect.y + h, w: rect.w, h: rect.h - h },
                };
            }
        }

        /**
         * Squarified treemap.
         *
         * @param rect  { x, y, w, h } — pixel rect to fill
         * @param items [{ id, value }] — value > 0; order doesn't matter,
         *              the algorithm sorts descending internally
         * @returns [{ id, x, y, w, h }]
         */
        function squarify(rect, items) {
            if (!items || items.length === 0 || rect.w <= 0 || rect.h <= 0) return [];
            const sorted = items.slice().sort((a, b) => b.value - a.value);
            const total = sorted.reduce((a, b) => a + b.value, 0);
            if (total <= 0) return [];
            const area = rect.w * rect.h;
            const scale = area / total;
            // Pool carries id + area-normalized value together.
            const pool = sorted.map((it) => ({ id: it.id, value: it.value * scale }));

            const placed = [];
            let remaining = { ...rect };

            while (pool.length > 0) {
                const short = Math.min(remaining.w, remaining.h);
                const row = [];
                let rowSum = 0;
                let rowWorst = Infinity;

                while (pool.length > 0) {
                    const candidate = pool[0];
                    const nextSum = rowSum + candidate.value;
                    const trial = row.map((r) => r.value).concat([candidate.value]);
                    const trialWorst = worstRatio(trial, nextSum, short);
                    if (row.length === 0 || trialWorst <= rowWorst) {
                        row.push(candidate);
                        rowSum = nextSum;
                        rowWorst = trialWorst;
                        pool.shift();
                    } else {
                        break;
                    }
                }

                const { placed: rects, remaining: rem } = layoutRow(row, remaining);
                for (const r of rects) placed.push(r);
                remaining = rem;
                if (remaining.w <= 0.5 || remaining.h <= 0.5) break;
            }

            return placed;
        }

        // Self-test for squarify: sum of areas ≈ rect area; every tile
        // lies inside the rect; single-item and two-item cases are exact.
        (function testSquarify() {
            const rect = { x: 0, y: 0, w: 600, h: 400 };
            const items = [
                { id: 'a', value: 6 },
                { id: 'b', value: 6 },
                { id: 'c', value: 4 },
                { id: 'd', value: 3 },
                { id: 'e', value: 2 },
                { id: 'f', value: 2 },
                { id: 'g', value: 1 },
            ];
            const out = squarify(rect, items);
            let fails = 0;
            if (out.length !== items.length) {
                console.error(`squarify FAIL: expected ${items.length} tiles, got ${out.length}`);
                fails++;
            }
            const totalArea = rect.w * rect.h;
            let laidArea = 0;
            for (const t of out) {
                laidArea += t.w * t.h;
                if (t.x < rect.x - 0.01 || t.y < rect.y - 0.01
                    || t.x + t.w > rect.x + rect.w + 0.01
                    || t.y + t.h > rect.y + rect.h + 0.01) {
                    console.error(`squarify FAIL: tile ${t.id} out of bounds`, t);
                    fails++;
                }
            }
            if (Math.abs(laidArea - totalArea) > 1) {
                console.error(`squarify FAIL: area mismatch — laid ${laidArea} vs rect ${totalArea}`);
                fails++;
            }
            const single = squarify(rect, [{ id: 'only', value: 1 }]);
            if (single.length !== 1
                || Math.abs(single[0].w - rect.w) > 0.01
                || Math.abs(single[0].h - rect.h) > 0.01) {
                console.error('squarify FAIL: single-item should fill the rect', single);
                fails++;
            }
            if (squarify(rect, []).length !== 0) {
                console.error('squarify FAIL: empty items should return []');
                fails++;
            }
            if (fails === 0) {
                console.log('squarify: %d checks PASS', items.length + 3);
            } else {
                console.error(`squarify: ${fails} FAIL`);
            }
        })();

        // --- Layout state ---

        const HEAT_SMOOTH_ALPHA = 0.15; // ~15s half-life at 1 Hz polling
        const LAYOUT_REFRESH_MS = 3000;
        const LAYOUT_FREEZE_MS = 5000;
        // Skip a re-layout if no agent's smoothed heat moved by more than
        // this fraction since the last apply. Keeps the dashboard stable
        // during demos when agents are mostly idle.
        const LAYOUT_DIFF_THRESHOLD = 0.15;

        // --- Debug tracing ---
        // `window.atnDebug.trace()` turns on console logging for every
        // layout apply / heat poll / tile-scale update so you can see
        // exactly what's firing — useful when something looks jittery.
        const atnDebug = {
            traceOn: false,
            trace(on = true) { this.traceOn = on; console.log(`atnDebug.trace: ${on}`); },
            log(event, data) {
                if (this.traceOn) console.debug(`[atn] ${event}`, data || '');
            },
        };

        // Focus-panel width fractions keyed by layoutState.focusSize:
        // [minFrac, maxFrac] of the total viewport width.
        const FOCUS_WIDTHS = { medium: [0.4, 0.5], large: [0.55, 0.7] };
        const PINS_MAX = 6;
        const LAYOUT_PREFS_KEY = 'atn-scale-ui-v1';

        const layoutState = {
            focusId: null,
            freezeUntil: 0,
            // per-agent EWMA of raw heat from /api/agents/heat
            smoothed: new Map(),
            enabled: false,
            pins: new Set(),
            focusSize: 'medium', // 'medium' | 'large' (legacy — scale-UI)
            filterText: '',
            // Set of "transport:mosh", "role:worker", "state:error" etc.
            // Within a category chips OR; across categories they AND.
            filterChips: new Set(),
            groupBy: '', // '' | 'role' | 'project'
            // Windowed UI saga (step 1): layout + sort modes.
            layoutMode: 'tiled', // 'tiled' (step 1) | future 'stack' | 'carousel'
            sortMode: 'name',    // 'name' (step 1) | future 'recent'
            // Windowed UI saga (step 2): per-window state + click-selected.
            windows: {}, // { [id]: { state: 'normal'|'minimized'|'maximized', pinned: bool } }
            selectedId: null,
        };

        function ensureWindow(id) {
            if (!layoutState.windows[id]) {
                layoutState.windows[id] = {
                    state: 'normal',
                    pinned: layoutState.pins.has(id),
                };
            }
            return layoutState.windows[id];
        }

        function windowState(id) {
            return (layoutState.windows[id] && layoutState.windows[id].state) || 'normal';
        }

        function hasMaximized() {
            for (const id of agents.keys()) {
                if (windowState(id) === 'maximized') return id;
            }
            return null;
        }

        /** Returns true if agentId passes the current filter. Pinned agents
         *  are not auto-included here — callers decide whether to override
         *  (pin row shows pinned regardless; treemap does not). */
        function matchesFilter(agentId) {
            const entry = agents.get(agentId);
            if (!entry) return false;
            const info = entry.info || {};
            const spec = info.spec || {};

            // Text match: fuzzy substring across name, project, role,
            // spec.host, spec.user. Case-insensitive.
            const q = (layoutState.filterText || '').trim().toLowerCase();
            if (q) {
                const hay = [
                    info.name || agentId,
                    spec.project || '',
                    info.role || '',
                    spec.host || '',
                    spec.user || '',
                    spec.agent || '',
                ].join(' ').toLowerCase();
                if (!hay.includes(q)) return false;
            }

            // Chips partitioned by category; within a category, any chip in
            // the set is a match (OR); across categories, all must match (AND).
            if (layoutState.filterChips.size > 0) {
                const byCat = new Map();
                for (const chip of layoutState.filterChips) {
                    const [cat, val] = chip.split(':');
                    if (!byCat.has(cat)) byCat.set(cat, new Set());
                    byCat.get(cat).add(val);
                }
                const transport = (spec.transport || 'local').toLowerCase();
                const role = (info.role || '').toLowerCase();
                const stateKeyNow = stateKey(info.state || { state: 'idle' });
                for (const [cat, vals] of byCat) {
                    let val;
                    if (cat === 'transport') val = transport;
                    else if (cat === 'role') val = role;
                    else if (cat === 'state') val = stateKeyNow;
                    else continue;
                    if (!vals.has(val)) return false;
                }
            }
            return true;
        }

        function saveLayoutPrefs() {
            try {
                const data = JSON.stringify({
                    pins: Array.from(layoutState.pins),
                    focusId: layoutState.focusId,
                    focusSize: layoutState.focusSize,
                    filterText: layoutState.filterText,
                    filterChips: Array.from(layoutState.filterChips),
                    groupBy: layoutState.groupBy,
                    layoutMode: layoutState.layoutMode,
                    sortMode: layoutState.sortMode,
                });
                localStorage.setItem(LAYOUT_PREFS_KEY, data);
            } catch (_) { /* localStorage unavailable or full — ignore */ }
        }

        // --- Saved layouts ---
        const SAVED_LAYOUTS_KEY = 'atn-scale-ui-saved-layouts-v1';

        function listSavedLayouts() {
            try {
                return JSON.parse(localStorage.getItem(SAVED_LAYOUTS_KEY) || '{}') || {};
            } catch (_) {
                return {};
            }
        }

        function writeSavedLayouts(map) {
            try {
                localStorage.setItem(SAVED_LAYOUTS_KEY, JSON.stringify(map));
            } catch (_) {}
        }

        function saveNamedLayout(name) {
            if (!name) return;
            const map = listSavedLayouts();
            map[name] = {
                pins: Array.from(layoutState.pins),
                focusId: layoutState.focusId,
                focusSize: layoutState.focusSize,
                filterText: layoutState.filterText,
                filterChips: Array.from(layoutState.filterChips),
                groupBy: layoutState.groupBy,
            };
            writeSavedLayouts(map);
            refreshSavedLayoutsDropdown();
        }

        function applyNamedLayout(name) {
            const map = listSavedLayouts();
            const lyt = map[name];
            if (!lyt) return;
            layoutState.pins = new Set(lyt.pins || []);
            layoutState.focusId = lyt.focusId || null;
            layoutState.focusSize = lyt.focusSize === 'large' ? 'large' : 'medium';
            layoutState.filterText = lyt.filterText || '';
            layoutState.filterChips = new Set(lyt.filterChips || []);
            layoutState.groupBy = lyt.groupBy || '';
            saveLayoutPrefs();
            // Reflect state in the filter bar UI.
            const input = document.getElementById('filter-input');
            if (input) input.value = layoutState.filterText;
            document.querySelectorAll('.filter-bar .chip').forEach((c) => {
                c.classList.toggle('active', layoutState.filterChips.has(c.getAttribute('data-chip')));
            });
            const gSel = document.getElementById('group-by');
            if (gSel) gSel.value = layoutState.groupBy;
            renderPinRow();
            syncPinButtons();
            const dashboard = document.getElementById('dashboard');
            if (dashboard && layoutState.enabled) {
                applyLayout(computeLayout(dashboard));
            }
        }

        function deleteNamedLayout(name) {
            if (!name) return;
            const map = listSavedLayouts();
            delete map[name];
            writeSavedLayouts(map);
            refreshSavedLayoutsDropdown();
        }

        function refreshSavedLayoutsDropdown() {
            const sel = document.getElementById('saved-layouts');
            if (!sel) return;
            const map = listSavedLayouts();
            const names = Object.keys(map).sort();
            sel.innerHTML = '<option value="">— saved —</option>'
                + names.map((n) => `<option value="${n}">${n}</option>`).join('');
        }

        function loadLayoutPrefs() {
            try {
                const raw = localStorage.getItem(LAYOUT_PREFS_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                if (Array.isArray(data.pins)) layoutState.pins = new Set(data.pins);
                if (typeof data.focusId === 'string') layoutState.focusId = data.focusId;
                if (data.focusSize === 'medium' || data.focusSize === 'large') {
                    layoutState.focusSize = data.focusSize;
                }
                if (typeof data.filterText === 'string') layoutState.filterText = data.filterText;
                if (Array.isArray(data.filterChips)) {
                    layoutState.filterChips = new Set(data.filterChips);
                }
                if (data.groupBy === 'role' || data.groupBy === 'project') {
                    layoutState.groupBy = data.groupBy;
                }
                if (data.layoutMode === 'tiled' || data.layoutMode === 'stack' || data.layoutMode === 'carousel') {
                    layoutState.layoutMode = data.layoutMode;
                }
                if (data.sortMode === 'name' || data.sortMode === 'recent') {
                    layoutState.sortMode = data.sortMode;
                }
            } catch (_) { /* malformed prefs — drop */ }
        }

        function setupFilterBar() {
            const input = document.getElementById('filter-input');
            if (input) {
                input.value = layoutState.filterText || '';
                input.addEventListener('input', () => {
                    layoutState.filterText = input.value;
                    saveLayoutPrefs();
                    const dashboard = document.getElementById('dashboard');
                    if (dashboard && layoutState.enabled) {
                        applyLayout(computeLayout(dashboard));
                    }
                });
            }
            document.querySelectorAll('.filter-bar .chip[data-chip]').forEach((c) => {
                const chip = c.getAttribute('data-chip');
                c.classList.toggle('active', layoutState.filterChips.has(chip));
                c.addEventListener('click', () => {
                    if (layoutState.filterChips.has(chip)) {
                        layoutState.filterChips.delete(chip);
                    } else {
                        layoutState.filterChips.add(chip);
                    }
                    c.classList.toggle('active', layoutState.filterChips.has(chip));
                    saveLayoutPrefs();
                    const dashboard = document.getElementById('dashboard');
                    if (dashboard && layoutState.enabled) {
                        applyLayout(computeLayout(dashboard));
                    }
                });
            });
            const gSel = document.getElementById('group-by');
            if (gSel) {
                gSel.value = layoutState.groupBy || '';
                gSel.addEventListener('change', () => {
                    layoutState.groupBy = gSel.value;
                    saveLayoutPrefs();
                    const dashboard = document.getElementById('dashboard');
                    if (dashboard && layoutState.enabled) {
                        applyLayout(computeLayout(dashboard));
                    }
                });
            }
            const saveBtn = document.getElementById('layout-save');
            if (saveBtn) saveBtn.addEventListener('click', () => {
                const name = prompt('Name this layout:');
                if (name) saveNamedLayout(name);
            });
            const applyBtn = document.getElementById('layout-apply');
            if (applyBtn) applyBtn.addEventListener('click', () => {
                const sel = document.getElementById('saved-layouts');
                if (sel && sel.value) applyNamedLayout(sel.value);
            });
            const delBtn = document.getElementById('layout-delete');
            if (delBtn) delBtn.addEventListener('click', () => {
                const sel = document.getElementById('saved-layouts');
                if (sel && sel.value) deleteNamedLayout(sel.value);
            });
            const refreshBtn = document.getElementById('btn-refresh-layout');
            if (refreshBtn) refreshBtn.addEventListener('click', () => {
                const dashboard = document.getElementById('dashboard');
                if (!dashboard || !layoutState.enabled) return;
                atnDebug.log('refresh:manual', {});
                applyLayout(computeLayout(dashboard));
                _lastAppliedHeat = new Map(layoutState.smoothed);
                refreshBtn.textContent = '↻ Refreshed';
                setTimeout(() => { refreshBtn.textContent = '↻ Refresh'; }, 800);
            });
        }

        function syncPinButtons() {
            document.querySelectorAll('.btn-pin[data-pin-id]').forEach((btn) => {
                const id = btn.getAttribute('data-pin-id');
                btn.classList.toggle('pinned', layoutState.pins.has(id));
                btn.title = layoutState.pins.has(id) ? 'Unpin' : 'Pin to always-visible row';
            });
        }

        function togglePin(agentId) {
            if (layoutState.pins.has(agentId)) {
                layoutState.pins.delete(agentId);
            } else {
                if (layoutState.pins.size >= PINS_MAX) {
                    console.warn(`pin limit reached (${PINS_MAX}); unpin something first`);
                    return;
                }
                layoutState.pins.add(agentId);
                // Pinning the current focus gives focus back to auto-pick.
                if (layoutState.focusId === agentId) {
                    layoutState.focusId = null;
                }
            }
            saveLayoutPrefs();
            renderPinRow();
            syncPinButtons();
            const dashboard = document.getElementById('dashboard');
            if (dashboard && layoutState.enabled) {
                applyLayout(computeLayout(dashboard));
            }
        }

        function renderPinRow() {
            const row = document.getElementById('pin-row');
            if (!row) return;
            row.innerHTML = '';
            const anyPins = layoutState.pins.size > 0;
            row.classList.toggle('visible', anyPins);
            for (const id of layoutState.pins) {
                if (!agents.has(id)) continue;
                const cell = document.createElement('div');
                cell.className = 'pin-cell';
                cell.dataset.agentId = id;
                const a = agents.get(id);
                const name = a?.panel?.querySelector?.('.agent-name')?.textContent || id;
                const role = a?.panel?.querySelector?.('.agent-role')?.textContent || 'agent';
                const stateLabelTxt = a?.panel?.querySelector?.('.state-badge')?.textContent || 'Idle';
                const stateCls = a?.panel?.querySelector?.('.state-badge')?.className || 'state-badge state-idle';
                cell.innerHTML = `
                    <button class="pin-unpin" title="Unpin" data-unpin-id="${id}">×</button>
                    <div class="pin-head">
                        <span class="pin-icon">📌</span>
                        <span class="pin-name" title="${name}">${name}</span>
                        <span class="${stateCls} pin-state">${stateLabelTxt}</span>
                    </div>
                    <div class="pin-body">
                        <svg class="sparkline" viewBox="0 0 44 14" preserveAspectRatio="none">
                            <path d="" id="pin-spark-${id}"></path>
                        </svg>
                        <span class="pin-lastline" id="pin-lastline-${id}">&nbsp;</span>
                    </div>
                `;
                cell.addEventListener('click', (e) => {
                    // Clicking the × unpins; clicking elsewhere focuses.
                    if (e.target.closest('[data-unpin-id]')) {
                        togglePin(id);
                        e.stopPropagation();
                        return;
                    }
                    document.dispatchEvent(new CustomEvent('swap-to-focus', {
                        detail: { agentId: id },
                    }));
                });
                row.appendChild(cell);
                // Seed sparkline + last-line from current state.
                const path = cell.querySelector(`#pin-spark-${id}`);
                if (path) path.setAttribute('d', sparklinePath(a.heatRing, 44, 14));
                const ll = cell.querySelector(`#pin-lastline-${id}`);
                if (ll) ll.textContent = a.lastLine || ' ';
            }
        }

        function renderWindowDock(minimized) {
            const dock = document.getElementById('window-dock');
            if (!dock) return;
            dock.classList.toggle('visible', minimized.length > 0);
            dock.innerHTML = '';
            for (const item of minimized) {
                const a = agents.get(item.id);
                if (!a) continue;
                const info = a.info || {};
                const stateObj = info.state || { state: 'idle' };
                const sk = stateKey(stateObj);
                const nameTxt = a.panel?.querySelector?.('.agent-name')?.textContent || item.id;
                const roleTxt = a.panel?.querySelector?.('.agent-role')?.textContent || '';
                const lastLine = a.lastLine || '';
                const cell = document.createElement('div');
                cell.className = 'dock-cell';
                cell.dataset.windowId = item.id;
                cell.title = `Restore ${nameTxt}`;
                cell.innerHTML = `
                    <div class="dock-head">
                        <span class="dock-name">${escapeHTML(nameTxt)}</span>
                        <span class="dock-role">${escapeHTML(roleTxt)}</span>
                        <span class="state-badge state-${sk} dock-state">${stateLabel(stateObj)}</span>
                    </div>
                    <div class="dock-last">${escapeHTML(lastLine) || '&nbsp;'}</div>
                `;
                dock.appendChild(cell);
            }
        }

        function escapeHTML(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function syncPinFilteredLabels() {
            document.querySelectorAll('.pin-cell[data-agent-id]').forEach((cell) => {
                const id = cell.getAttribute('data-agent-id');
                cell.classList.toggle('filtered', !matchesFilter(id));
            });
        }

        function refreshPinCell(agentId) {
            const cell = document.querySelector(`.pin-cell[data-agent-id="${agentId}"]`);
            if (!cell) return;
            const a = agents.get(agentId);
            if (!a) return;
            const path = cell.querySelector(`#pin-spark-${agentId}`);
            if (path) path.setAttribute('d', sparklinePath(a.heatRing, 44, 14));
            const ll = cell.querySelector(`#pin-lastline-${agentId}`);
            if (ll) ll.textContent = a.lastLine || ' ';
        }

        function updateSmoothedHeat(agentId, rawHeat) {
            const prev = layoutState.smoothed.get(agentId) ?? rawHeat;
            const next = prev * (1 - HEAT_SMOOTH_ALPHA) + rawHeat * HEAT_SMOOTH_ALPHA;
            layoutState.smoothed.set(agentId, next);
            return next;
        }

        function autoPickFocus(items) {
            if (items.length === 0) return null;
            // Prefer the highest-heat coordinator if there is one.
            let bestCoord = null, bestCoordV = -1;
            let bestAny = items[0];
            for (const it of items) {
                if (it.value > bestAny.value) bestAny = it;
                const a = agents.get(it.id);
                const role = a?.role || (a?.panel?.querySelector?.('.agent-role')?.textContent) || '';
                if (role.toLowerCase() === 'coordinator' && it.value > bestCoordV) {
                    bestCoord = it;
                    bestCoordV = it.value;
                }
            }
            return (bestCoord || bestAny).id;
        }

        function roleOf(id) {
            const a = agents.get(id);
            return (a?.info?.role
                || a?.panel?.querySelector?.('.agent-role')?.textContent
                || '').toLowerCase();
        }

        function buildLayoutItems() {
            // Name-sorted, non-pinned, non-filtered agents. Coord promotion
            // is done inside computeLayout so the sort is a stable default
            // without special-casing here.
            const ids = Array.from(agents.keys())
                .filter((id) => !layoutState.pins.has(id) && matchesFilter(id));
            ids.sort((a, b) => a.localeCompare(b));
            return ids.map((id) => ({ id }));
        }

        // --- Windowed layout (saga: windowed-ui) ---
        //
        // Layout is mode-driven: the step-1 foundation supports `tiled`
        // only. Later saga steps add stack + carousel. Coord is always
        // placed prominently (left slice) regardless of sort order so the
        // demo has a clear "primary window".

        const COORD_FRAC = 0.55; // coord takes 55% of dashboard width
        const TILE_GAP = 4;

        function gridRects(rect, items) {
            // Simple grid of equal cells. Picks cols×rows roughly matching
            // the rect's aspect ratio. Small-N uses a single column so a
            // vertically-tall sidebar doesn't produce micro-thin tiles.
            if (items.length === 0) return [];
            const aspect = rect.w / rect.h;
            let cols = Math.max(1, Math.round(Math.sqrt(items.length * aspect)));
            if (items.length <= 3 && aspect < 1.2) cols = 1;
            const rows = Math.ceil(items.length / cols);
            const cellW = Math.floor(rect.w / cols);
            const cellH = Math.floor(rect.h / rows);
            const out = [];
            for (let i = 0; i < items.length; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                out.push({
                    id: items[i].id,
                    x: rect.x + c * cellW,
                    y: rect.y + r * cellH,
                    w: Math.max(80, cellW - TILE_GAP),
                    h: Math.max(80, cellH - TILE_GAP),
                });
            }
            return out;
        }

        function computeLayout(container) {
            const all = buildLayoutItems();
            if (all.length === 0) return { windows: [], minimized: [] };

            const rect = {
                x: 4,
                y: 4,
                w: Math.max(240, container.clientWidth - 8),
