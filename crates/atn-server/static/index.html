                h: Math.max(200, container.clientHeight - 8),
            };

            // Separate minimized and maximized from normal-state agents.
            const minimized = all.filter((it) => windowState(it.id) === 'minimized');
            const maxed = all.find((it) => windowState(it.id) === 'maximized');

            // Maximized short-circuits everything: one window fills ~80%
            // centered, every other window is implicitly dock-minimized
            // for the duration (without mutating their stored state).
            if (maxed) {
                const maxW = Math.floor(rect.w * 0.8);
                const maxH = Math.floor(rect.h * 0.9);
                const maxRect = {
                    id: maxed.id,
                    x: rect.x + Math.floor((rect.w - maxW) / 2),
                    y: rect.y + Math.floor((rect.h - maxH) / 2),
                    w: maxW, h: maxH,
                };
                const implicitDock = all.filter((it) => it.id !== maxed.id);
                return { windows: [maxRect], minimized: implicitDock };
            }

            // Otherwise lay out normal-state agents (dock minimized separately).
            const normal = all.filter((it) => windowState(it.id) === 'normal');
            if (normal.length === 0) return { windows: [], minimized };

            const coordIdx = normal.findIndex((it) => roleOf(it.id) === 'coordinator');
            const coord = coordIdx >= 0 ? normal[coordIdx] : null;
            const workers = coord
                ? normal.filter((_, i) => i !== coordIdx)
                : normal.slice();

            if (!coord) return { windows: gridRects(rect, workers), minimized };
            if (workers.length === 0) {
                return { windows: [{ id: coord.id, ...rect }], minimized };
            }
            const coordW = Math.floor(rect.w * COORD_FRAC) - TILE_GAP / 2;
            const coordRect = { id: coord.id, x: rect.x, y: rect.y, w: coordW, h: rect.h };
            const workerArea = {
                x: rect.x + coordW + TILE_GAP,
                y: rect.y,
                w: rect.w - coordW - TILE_GAP,
                h: rect.h,
            };
            return {
                windows: [coordRect, ...gridRects(workerArea, workers)],
                minimized,
            };
        }

        /** Partition items by a group key drawn from agent meta. Returns an
         *  ordered Map so iteration order is stable (largest first). */
        function groupItems(items, key) {
            const groups = new Map();
            for (const it of items) {
                const entry = agents.get(it.id);
                const info = entry?.info || {};
                const spec = info.spec || {};
                let g;
                if (key === 'role') g = (info.role || 'other').toLowerCase();
                else if (key === 'project') g = spec.project || info.name || 'other';
                else g = 'other';
                if (!groups.has(g)) groups.set(g, []);
                groups.get(g).push(it);
            }
            // Sort by total value desc so the biggest group gets the
            // largest rect.
            const sorted = Array.from(groups.entries())
                .map(([k, arr]) => ({
                    key: k,
                    items: arr,
                    total: arr.reduce((s, i) => s + i.value, 0),
                }))
                .sort((a, b) => b.total - a.total);
            return sorted;
        }

        /** Lay out grouped items: split `rect` horizontally (or vertically if
         *  the rect is taller than wide) by group weights, then squarify
         *  inside each sub-rect. Returns {tiles, bands} where bands are
         *  overlay rects (for group outlines). */
        function groupedSquarify(rect, groups) {
            if (groups.length === 0) return { tiles: [], bands: [] };
            const total = groups.reduce((s, g) => s + g.total, 0);
            if (total <= 0) return { tiles: [], bands: [] };

            const horizontal = rect.w >= rect.h;
            const tiles = [];
            const bands = [];
            let cursor = horizontal ? rect.x : rect.y;
            const GAP = 4;
            for (let i = 0; i < groups.length; i++) {
                const g = groups[i];
                const frac = g.total / total;
                let sub;
                const thisGap = i === groups.length - 1 ? 0 : GAP;
                if (horizontal) {
                    const w = Math.max(40, Math.floor(rect.w * frac) - thisGap);
                    sub = { x: cursor, y: rect.y, w, h: rect.h };
                    cursor += w + thisGap;
                } else {
                    const h = Math.max(40, Math.floor(rect.h * frac) - thisGap);
                    sub = { x: rect.x, y: cursor, w: rect.w, h };
                    cursor += h + thisGap;
                }
                const placed = squarify({ x: sub.x + 2, y: sub.y + 12, w: sub.w - 4, h: sub.h - 14 }, g.items);
                for (const t of placed) tiles.push(t);
                bands.push({ key: g.key, ...sub });
            }
            return { tiles, bands };
        }

        function ensureModeFor(id, rect) {
            // Pick xterm vs compact based on the rect fit, using the step-3
            // scale picker. Switches the tile mode if needed.
            const a = agents.get(id);
            if (!a) return;
            const { w: natW, h: natH } = nativeTermSize(id);
            const k = pickTermScale(rect.w - 16, rect.h - 40, natW, natH);
            const wantCompact = k === null;
            if (wantCompact && a.mode !== 'compact') toggleCompactMode(id);
            if (!wantCompact && a.mode !== 'xterm') toggleCompactMode(id);
        }

        function applyLayout(layout) {
            const dashboard = document.getElementById('dashboard');
            if (!dashboard) return;
            const windows = layout.windows || [];
            const minimized = layout.minimized || [];
            atnDebug.log('apply', {
                count: windows.length,
                ids: windows.map(w => `${w.id}(${Math.round(w.w)}x${Math.round(w.h)})`),
                min: minimized.map(m => m.id),
            });
            const place = (id, rect) => {
                const el = document.getElementById(`panel-${id}`)
                    || document.getElementById(`compact-${id}`);
                if (!el) return;
                el.style.left = `${rect.x}px`;
                el.style.top = `${rect.y}px`;
                el.style.width = `${rect.w}px`;
                el.style.height = `${rect.h}px`;
                if (el.classList.contains('agent-panel')) {
                    el.classList.remove('focus');
                }
            };
            // Move any not-in-layout panels off-screen (pinned agents,
            // filter misses, minimized agents — the dock shows those).
            const visibleIds = new Set(windows.map(w => w.id));
            for (const id of agents.keys()) {
                if (layoutState.pins.has(id)) continue;
                if (visibleIds.has(id)) continue;
                const el = document.getElementById(`panel-${id}`)
                    || document.getElementById(`compact-${id}`);
                if (el) {
                    el.style.left = '-9999px';
                    el.style.top = '-9999px';
                    el.style.width = '0';
                    el.style.height = '0';
                }
            }
            for (const w of windows) {
                ensureModeFor(w.id, w);
                place(w.id, w);
            }
            // Selected outline follows state.
            document.querySelectorAll('.agent-panel.selected').forEach(el => el.classList.remove('selected'));
            if (layoutState.selectedId) {
                const sel = document.getElementById(`panel-${layoutState.selectedId}`);
                if (sel) {
                    sel.classList.add('selected');
                    // Selected non-minimized tile gets full xterm fit.
                    fitSelectedTerm(layoutState.selectedId);
                }
            }
            // Step 1 has no group bands; clear any that may have been left
            // over from a stale layout.
            dashboard.querySelectorAll('.group-band').forEach((b) => b.remove());
            renderWindowDock(minimized);
            // Refresh the pin row so (filtered) labels update.
            syncPinFilteredLabels();
            // After positions change, update per-xterm scales.
            updateTileScales();
        }

        // Snapshot of the last heat values we applied a layout from.
        // Used to decide whether the next tick should re-layout at all.
        let _lastAppliedHeat = new Map();

        function heatDiffersSignificantly() {
            const cur = layoutState.smoothed;
            if (cur.size !== _lastAppliedHeat.size) return true;
            for (const [id, v] of cur) {
                const prev = _lastAppliedHeat.get(id);
                if (prev === undefined) return true;
                const base = Math.max(prev, 0.02);
                if (Math.abs(v - prev) / base > LAYOUT_DIFF_THRESHOLD) return true;
            }
            return false;
        }

        function treemapRefreshTick() {
            if (!layoutState.enabled) return;
            if (Date.now() < layoutState.freezeUntil) {
                atnDebug.log('tick:skip', 'frozen');
                return;
            }
            const dashboard = document.getElementById('dashboard');
            if (!dashboard) return;
            // Skip the re-layout when nothing has meaningfully shifted.
            // Prevents the "tiles zooming in and out" feeling when agents
            // are mostly idle and the smoothed heat just wobbles slightly.
            if (!heatDiffersSignificantly()) {
                atnDebug.log('tick:skip', 'heat-stable');
                return;
            }
            atnDebug.log('tick:apply', { smoothed: Object.fromEntries(layoutState.smoothed) });
            applyLayout(computeLayout(dashboard));
            _lastAppliedHeat = new Map(layoutState.smoothed);
        }

        function enableTreemapMode() {
            const dashboard = document.getElementById('dashboard');
            if (!dashboard) return;
            dashboard.classList.add('treemap-mode');
            dashboard.classList.remove('cols-1', 'cols-2', 'cols-3', 'cols-4');
            layoutState.enabled = true;
            applyLayout(computeLayout(dashboard));
        }

        const STATE_LABELS = {
            starting: 'Starting',
            running: 'Running',
            idle: 'Idle',
            awaiting_human_input: 'Awaiting Input',
            busy: 'Busy',
            blocked: 'Blocked',
            completed_task: 'Completed',
            error: 'Error',
            disconnected: 'Disconnected',
        };

        function stateKey(stateObj) {
            if (typeof stateObj === 'string') return stateObj;
            if (stateObj && stateObj.state) return stateObj.state;
            return 'starting';
        }

        function stateLabel(stateObj) {
            const key = stateKey(stateObj);
            return STATE_LABELS[key] || key;
        }

        function createAgentPanel(agent) {
            const panel = document.createElement('div');
            panel.className = 'agent-panel';
            panel.id = `panel-${agent.id}`;

            const sk = stateKey(agent.state);

            // Compose a tooltip so hover reveals the shell command ATN is running.
            const launchTip = agent.launch_command
                ? agent.launch_command.replace(/"/g, '&quot;')
                : `${agent.name}`;

            panel.innerHTML = `
                <div class="agent-header" data-window-id="${agent.id}" style="cursor: pointer;" title="Click to select">
                    <span class="agent-name" title="${launchTip}">${agent.name}</span>
                    <span class="agent-role">${agent.role}</span>
                    <span id="saga-badge-${agent.id}" style="font-size:11px;color:#a78bfa;"></span>
                    <span class="spacer"></span>
                    <span class="tile-actions" data-no-focus="1">
                        <button class="btn-icon btn-min" data-window-action="minimize" data-window-id="${agent.id}" title="Minimize (m)">_</button>
                        <button class="btn-icon btn-max" data-window-action="maximize" data-window-id="${agent.id}" title="Maximize / restore (M)">□</button>
                        <button class="btn-icon btn-pin" data-window-action="pin" data-window-id="${agent.id}" title="Pin (p)">📌</button>
                        <button class="btn-icon btn-cfg" data-window-action="config" data-window-id="${agent.id}" title="Config">▸</button>
                        <button class="btn-icon btn-rc" data-window-action="reconnect" data-window-id="${agent.id}" title="Reconnect">↻</button>
                        <button class="btn-icon btn-delete" data-window-action="delete" data-window-id="${agent.id}" title="Delete">✕</button>
                    </span>
                    <span class="conn-dot disconnected" id="conn-${agent.id}"></span>
                    <span class="state-badge state-${sk}" id="badge-${agent.id}">${stateLabel(agent.state)}</span>
                </div>
                <div class="agent-launch" id="launch-${agent.id}" title="${launchTip}" style="font-family:monospace;font-size:10px;color:#6b7280;padding:2px 8px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${agent.launch_command || '&nbsp;'}
                </div>
                <div class="agent-terminal" id="term-tile-${agent.id}">
                    <div class="term-scale" id="term-scale-${agent.id}">
                        <div id="term-${agent.id}"></div>
                    </div>
                </div>
                <div class="agent-controls">
                    <input type="text" id="input-${agent.id}" placeholder="Command for ${agent.name}...">
                    <button class="btn-send" data-agent="${agent.id}">Send</button>
                    <button class="btn-ctrl-c" data-agent="${agent.id}">^C</button>
                    <button class="btn-restart" data-agent="${agent.id}" title="Graceful shutdown (Ctrl-C x2) and respawn">Restart</button>
                    <button class="btn-reconnect" data-agent="${agent.id}" title="Hard-kill local mosh/ssh and respawn. For mosh+tmux, re-attaches to the still-running remote session.">Reconnect</button>
                    <button class="btn-stop" data-agent="${agent.id}">Stop</button>
                    <button class="btn-edit-cfg" data-agent="${agent.id}">Config</button>
                    <button class="btn-delete" data-agent="${agent.id}">Delete</button>
                </div>
                <div class="agent-config-editor" id="cfg-${agent.id}" data-agent-id="${agent.id}"></div>
            `;
            return panel;
        }

        // TERM_NATIVE_COLS / TERM_NATIVE_ROWS are declared earlier in the
        // script, before the scale picker that depends on them.

        function initTerminal(agentId) {
            const term = new Terminal({
                cursorBlink: true,
                fontSize: 13,
                scrollback: 5000,
                cols: TERM_NATIVE_COLS,
                rows: TERM_NATIVE_ROWS,
                fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
                theme: {
                    background: '#0d1117',
                    foreground: '#c9d1d9',
                    cursor: '#e94560',
                    selectionBackground: '#264f78',
                },
            });
            // fit-addon stays attached so the focus path can still snap an
            // agent's xterm back to its container when promoted. It's no
            // longer wired into the window-resize pipeline.
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const container = document.getElementById(`term-${agentId}`);
            term.open(container);
            // Measure xterm's actual unscaled pixel size RIGHT NOW, before
            // any --term-k CSS variable is set on the wrapper. This is the
            // native reference nativeTermSize() returns forever after, so
            // the scale picker never sees a post-transform measurement
            // (which would positive-feedback into "Open Code → Open C →
            // Op" zoom oscillation on every Refresh).
            const rect = container.getBoundingClientRect();
            const nativeW = rect.width > 0 ? rect.width : TERM_NATIVE_W_DEFAULT;
            const nativeH = rect.height > 0 ? rect.height : TERM_NATIVE_H_DEFAULT;

            // Tell the PTY about the native geometry exactly once. Subsequent
            // layout changes only update CSS scale (see updateTileScales).
            syncPtySize(agentId, term);
            return { term, fitAddon, nativeW, nativeH };
        }

        function syncPtySize(agentId, term) {
            fetch(`${API_BASE}/api/agents/${agentId}/resize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cols: term.cols, rows: term.rows }),
            }).catch(() => {});
        }

        function connectSSE(agentId) {
            const connDot = document.getElementById(`conn-${agentId}`);
            const evtSource = new EventSource(`${API_BASE}/api/agents/${agentId}/sse`);
            const agent = agents.get(agentId);

            evtSource.onopen = () => {
                if (connDot) connDot.className = 'conn-dot connected';
            };

            evtSource.onmessage = (event) => {
                const bytes = Uint8Array.from(atob(event.data), c => c.charCodeAt(0));
                if (agent && agent.term) agent.term.write(bytes);
                // Also feed the compact-tile renderer's last-line buffer.
                recordOutputBytes(agentId, bytes);
                refreshCompactIfPresent(agentId);
            };

            evtSource.onerror = () => {
                if (connDot) connDot.className = 'conn-dot disconnected';
                evtSource.close();
                setTimeout(() => connectSSE(agentId), 2000);
            };

            agent.evtSource = evtSource;

            // Forward all keystrokes from xterm.js directly to the PTY.
            // This handles Enter, arrows, Tab, Escape, Ctrl combos, etc.
            agent.term.onData((data) => {
                fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_bytes: Array.from(new TextEncoder().encode(data)) }),
                });
            });
        }

        function setupControls(agentId) {
            const input = document.getElementById(`input-${agentId}`);
            const panel = document.getElementById(`panel-${agentId}`);
            const sendBtn = panel.querySelector('.btn-send');
            const ctrlcBtn = panel.querySelector('.btn-ctrl-c');

            function doSend() {
                const text = input.value;
                if (text) {
                    // Send text, then Enter as separate raw bytes after a
                    // short delay so TUI apps exit bracketed paste mode first.
                    fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text }),
                    }).then(() => {
                        setTimeout(() => {
                            sendRawBytes(agentId, [13]); // \r = Enter
                        }, 100);
                    });
                    input.value = '';
                }
                input.focus();
            }

            function sendRawBytes(agentId, bytes) {
                fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_bytes: bytes }),
                });
            }

            sendBtn.addEventListener('click', doSend);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); doSend(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 65]); }
                else if (e.key === 'ArrowDown') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 66]); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 67]); }
                else if (e.key === 'ArrowLeft') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 68]); }
                else if (e.key === 'Tab') { e.preventDefault(); sendRawBytes(agentId, [9]); }
                else if (e.key === 'Escape') { e.preventDefault(); sendRawBytes(agentId, [27]); }
            });

            ctrlcBtn.addEventListener('click', () => {
                fetch(`${API_BASE}/api/agents/${agentId}/ctrl-c`, { method: 'POST' });
                input.focus();
            });

            const restartBtn = panel.querySelector('.btn-restart');
            restartBtn.addEventListener('click', async () => {
                restartBtn.textContent = 'Restarting...';
                restartBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}/restart`, { method: 'POST' });
                    if (res.ok) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        agent.term.clear();
                        setTimeout(() => connectSSE(agentId), 1000);
                        restartBtn.textContent = 'Restarted';
                    } else {
                        restartBtn.textContent = 'Failed';
                    }
                } catch (_) {
                    restartBtn.textContent = 'Error';
                }
                setTimeout(() => { restartBtn.textContent = 'Restart'; restartBtn.disabled = false; }, 2000);
            });

            const reconnectBtn = panel.querySelector('.btn-reconnect');
            reconnectBtn.addEventListener('click', async () => {
                reconnectBtn.textContent = 'Reconnecting...';
                reconnectBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}/reconnect`, { method: 'POST' });
                    if (res.ok) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        // Don't clear the terminal — for mosh+tmux the re-attach
                        // should pick up the live remote session intact.
                        setTimeout(() => connectSSE(agentId), 1000);
                        reconnectBtn.textContent = 'Reconnected';
                    } else {
                        reconnectBtn.textContent = 'Failed';
                    }
                } catch (_) {
                    reconnectBtn.textContent = 'Error';
                }
                setTimeout(() => { reconnectBtn.textContent = 'Reconnect'; reconnectBtn.disabled = false; }, 2000);
            });

            const stopBtn = panel.querySelector('.btn-stop');
            stopBtn.addEventListener('click', async () => {
                stopBtn.textContent = 'Stopping...';
                stopBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}/stop`, { method: 'POST' });
                    if (res.ok) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        stopBtn.textContent = 'Stopped';
                    } else {
                        stopBtn.textContent = 'Failed';
                    }
                } catch (_) {
                    stopBtn.textContent = 'Error';
                }
                setTimeout(() => { stopBtn.textContent = 'Stop'; stopBtn.disabled = false; }, 2000);
            });

            const deleteBtn = panel.querySelector('.btn-delete');
            deleteBtn.addEventListener('click', async () => {
                if (!confirm(`Delete agent "${agentId}"? This will stop the session and remove it.`)) return;
                deleteBtn.textContent = 'Deleting...';
                deleteBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}`, { method: 'DELETE' });
                    if (res.ok || res.status === 204) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        agents.delete(agentId);
                        panel.remove();
                        refreshDashboardLayout();
                    } else {
                        deleteBtn.textContent = 'Failed';
                        setTimeout(() => { deleteBtn.textContent = 'Delete'; deleteBtn.disabled = false; }, 2000);
                    }
                } catch (_) {
                    deleteBtn.textContent = 'Error';
                    setTimeout(() => { deleteBtn.textContent = 'Delete'; deleteBtn.disabled = false; }, 2000);
                }
            });

            const editCfgBtn = panel.querySelector('.btn-edit-cfg');
            editCfgBtn.addEventListener('click', () => toggleConfig(agentId));
        }

        // Poll agent states every 2 seconds
        async function pollStates() {
            try {
                const res = await fetch(`${API_BASE}/api/agents`);
                if (!res.ok) return;
                const list = await res.json();
                for (const agent of list) {
                    const badge = document.getElementById(`badge-${agent.id}`);
                    if (badge) {
                        const sk = stateKey(agent.state);
                        badge.className = `state-badge state-${sk}`;
                        badge.textContent = stateLabel(agent.state);
                    }
                    // Stash the full AgentInfo on the agents map so the
                    // filter can match on spec.host / spec.user / role /
                    // state without a second fetch.
                    const entry = agents.get(agent.id);
                    if (entry) {
                        entry.info = agent;
                    }
                }
            } catch (_) { /* ignore */ }
        }

        async function pollAgentSagas(agentIds) {
            for (const id of agentIds) {
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${id}/saga`);
                    if (!res.ok) continue;
                    const data = await res.json();
                    const badge = document.getElementById(`saga-badge-${id}`);
                    if (badge && data.saga) {
                        const current = data.steps.find(s => s.status === 'in-progress');
                        badge.textContent = current ? `Step ${current.number}: ${current.slug}` : '';
                    }
                } catch (_) {}
            }
        }

        // Sort agents: coordinator first, then alphabetical.
        function sortAgents(list) {
            return list.sort((a, b) => {
                if (a.role === 'coordinator') return -1;
                if (b.role === 'coordinator') return 1;
                return a.name.localeCompare(b.name);
            });
        }

        async function init() {
            const res = await fetch(`${API_BASE}/api/agents`);
            const agentList = sortAgents(await res.json());

            const dashboard = document.getElementById('dashboard');
            const count = agentList.length;
            document.getElementById('agent-count').textContent = `${count} agent${count !== 1 ? 's' : ''}`;

            // Choose grid columns based on agent count
            if (count <= 1) dashboard.className = 'dashboard cols-1';
            else if (count <= 2) dashboard.className = 'dashboard cols-2';
            else if (count <= 3) dashboard.className = 'dashboard cols-3';
            else dashboard.className = 'dashboard cols-4';

            if (count === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.style.cssText = 'grid-column:1/-1;padding:48px 24px;text-align:center;color:#a0a0b0;';
                empty.innerHTML = `
                    <h2 style="color:#eee;margin:0 0 12px;">No agents yet</h2>
                    <p style="max-width:520px;margin:0 auto 20px;line-height:1.5;">
                        ATN is running but no agents are configured. Add one to get started&mdash;
                        pick a host (local or remote), working directory, and the agent CLI to run.
                    </p>
                    <button
                        style="padding:10px 20px;border:1px solid #4ecca3;border-radius:6px;background:#4ecca3;color:#0b0b14;cursor:pointer;font-size:14px;font-weight:600;"
                        onclick="toggleNewAgent()"
                    >+ New Agent</button>
                `;
                dashboard.appendChild(empty);
            }

            for (const agent of agentList) {
                const panel = createAgentPanel(agent);
                dashboard.appendChild(panel);

                const { term, fitAddon, nativeW, nativeH } = initTerminal(agent.id);
                agents.set(agent.id, { term, fitAddon, panel, evtSource: null, nativeW, nativeH });

                connectSSE(agent.id);
                setupControls(agent.id);
            }

            // Fetch per-agent saga step for badges
            pollAgentSagas(agentList.map(a => a.id));

            // Resize handling. xterm stays at fixed native geometry; the
            // treemap recomputes on window resize and per-tick, and
            // updateTileScales follows up to pick scale snap points.
            const onResize = () => {
                if (layoutState.enabled) {
                    const db = document.getElementById('dashboard');
                    if (db) applyLayout(computeLayout(db));
                }
                updateTileScales();
            };
            window.addEventListener('resize', onResize);
            new ResizeObserver(onResize).observe(dashboard);

            // Poll states
            setInterval(pollStates, 2000);

            // Start heat polling; feeds smoothedHeat for the treemap.
            startHeatPolling();

            // Hydrate user prefs (pins + focus + focus size + filter +
            // group-by) before the first layout so they're honored on the
            // very first render.
            loadLayoutPrefs();
            renderPinRow();
            syncPinButtons();

            // Wire the filter bar.
            setupFilterBar();
            refreshSavedLayoutsDropdown();

            // Show the filter bar once at least one agent exists.
            const fbar = document.getElementById('filter-bar');
            if (fbar && agentList.length > 0) fbar.classList.add('visible');

            // Flip the dashboard into treemap mode whenever at least one
            // agent is present (empty-state stays as the CTA card).
            if (agentList.length > 0) {
                enableTreemapMode();
            }

            // Treemap layout is explicit-refresh only — the ↻ Refresh
            // button in the filter bar recomputes on demand. Implicit
            // re-layouts still fire on agent create/delete/focus-swap
            // and on window / ResizeObserver resize so the dashboard
            // stays usable; only the timer-driven drift is gone.
            //
            // Use `atnDebug.trace()` in devtools to log every layout
            // event as it fires.

            // Expose dev toggles on window for devtools poking.
            window.toggleCompactMode = toggleCompactMode;
            window.setFocus = setFocus;
            window.pickTermScale = pickTermScale;
            window.layoutState = layoutState;
            window.squarify = squarify;
            window.enableTreemapMode = enableTreemapMode;
            window.togglePin = togglePin;
            window.saveLayoutPrefs = saveLayoutPrefs;
            window.atnDebug = atnDebug;
        }

        init();

        // ── Agent lifecycle controls ──────────────────────

        function toggleNewAgent() {
            const bar = document.getElementById('new-agent-bar');
            bar.classList.toggle('visible');
            if (bar.classList.contains('visible')) {
                // Belt-and-suspenders: re-attach listeners in case the
                // initial registration missed (can happen under some
                // browser extensions / aggressive caching).
                ensureNewAgentListeners();
                updateTransportFields();
                updateCommandPreview();
                // Keyboard-first flow: focus the name field so the
                // demo operator can start typing immediately.
                const nameEl = document.getElementById('new-name');
                if (nameEl) nameEl.focus();
            }
        }

        // Remembers the last mosh/ssh host the user typed so subsequent
        // worker-creates don't have to re-type it. Only the host — user
        // (and everything else) is expected to differ per worker.
        const LAST_HOST_KEY = 'atn-last-host';

        function updateTransportFields() {
            const transport = document.getElementById('new-transport').value;
            const remote = transport !== 'local';
            const remoteGroup = document.getElementById('new-remote-only');
            if (remoteGroup) remoteGroup.style.display = remote ? '' : 'none';
            if (!remote) {
                // Local agents have no user/host — clear so nothing leaks
                // into the composed command preview.
                document.getElementById('new-user').value = '';
                document.getElementById('new-host').value = '';
            } else {
                // Pre-fill host from the most recently used one if the
                // field is empty. Keeps the "many workers on one host"
                // flow fast.
                try {
                    const last = localStorage.getItem(LAST_HOST_KEY);
                    const hostEl = document.getElementById('new-host');
                    if (last && hostEl && !hostEl.value) hostEl.value = last;
                } catch (_) { /* ignore */ }
            }
            updateCommandPreview();
        }

        function readSpawnSpec() {
            const cliSel = document.getElementById('new-agent-cli');
            const customEl = document.getElementById('new-agent-custom');
            customEl.style.display = cliSel.value === '' ? 'inline-block' : 'none';
            const agentName = cliSel.value === '' ? customEl.value.trim() : cliSel.value;
            const name = document.getElementById('new-name').value.trim();
            const role = document.getElementById('new-role').value;
            const transport = document.getElementById('new-transport').value;
            const host = document.getElementById('new-host').value.trim();
            const user = document.getElementById('new-user').value.trim();
            const workingDir = document.getElementById('new-dir').value.trim();
            const project = document.getElementById('new-project').value.trim();
            const agentArgs = document.getElementById('new-agent-args').value.trim();
            // Local transport has no remote host/user; force null so the
            // hidden inputs can't leak stale values into the composed
            // command when the user flips mosh → local mid-edit.
            const isLocal = transport === 'local';
            return {
                name, role, transport,
                host: isLocal ? null : (host || null),
                user: isLocal ? null : (user || null),
                working_dir: workingDir,
                project: project || null,
                agent: agentName,
                agent_args: agentArgs || null,
            };
        }

        function validateSpec(s) {
            const missing = [];
            if (!s.name) missing.push('name');
            if (!s.working_dir) missing.push('working_dir');
            if (!s.agent) missing.push('agent');
            if (s.transport !== 'local') {
                if (!s.host) missing.push('host');
                if (!s.user) missing.push('user');
            }
            return missing;
        }

        function previewCommand(s) {
            const tail = s.agent_args ? `${s.agent} ${s.agent_args}` : s.agent;
            const inner = `cd ${s.working_dir || '<dir>'} && ${tail || '<agent>'}`;
            if (s.transport === 'local') return inner;
            const bin = s.transport; // mosh | ssh
            const user = s.user || '<user>';
            const host = s.host || '<host>';
            const sess = `atn-${s.name || '<name>'}`;
            return `${bin} ${user}@${host} -- tmux new-session -A -s ${sess} '${inner}'`;
        }

        function updateCommandPreview() {
            const spec = readSpawnSpec();
            document.getElementById('new-agent-preview').textContent = previewCommand(spec);
            const missing = validateSpec(spec);
            const err = document.getElementById('new-agent-err');
            // Only show a hint while typing; reserve the red "error" look
            // for the moment the user clicks Create. Keeps the initial
            // empty dialog from looking broken on open.
            if (missing.length) {
                err.textContent = `needs: ${missing.join(', ')}`;
                err.style.color = '#888';
            } else {
                err.textContent = '';
                err.style.color = '';
            }
        }

        // Register input listeners on the dialog fields. The inputs live
        // in the body above this script, so they already exist by the time
        // this runs — no need to gate on DOMContentLoaded. We also run this
        // from toggleNewAgent as a belt-and-suspenders measure so the live
        // preview + missing-field feedback always update while typing.
        let _newAgentListenersAttached = false;
        function ensureNewAgentListeners() {
            if (_newAgentListenersAttached) return;
            const ids = ['new-name','new-role','new-transport','new-host','new-user','new-dir',
                         'new-project','new-agent-cli','new-agent-custom','new-agent-args'];
            for (const id of ids) {
                const el = document.getElementById(id);
                if (!el) continue;
                el.addEventListener('input', updateCommandPreview);
                if (el.tagName === 'SELECT') el.addEventListener('change', updateCommandPreview);
            }
            _newAgentListenersAttached = true;
        }
        ensureNewAgentListeners();

        async function createAgent() {
            const spec = readSpawnSpec();
            const missing = validateSpec(spec);
            if (missing.length) {
                const err = document.getElementById('new-agent-err');
                err.textContent = `missing: ${missing.join(', ')}`;
                err.style.color = '#fca5a5';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(spec),
                });
                if (res.status === 201) {
                    const info = await res.json();
                    // Remember the host we just used so the next worker
                    // dialog pre-fills it. Skip for local transport.
                    if (spec.transport !== 'local' && spec.host) {
                        try { localStorage.setItem(LAST_HOST_KEY, spec.host); } catch (_) {}
                    }
                    // Clear form.
                    ['new-name','new-host','new-user','new-dir','new-project','new-agent-args','new-agent-custom']
                        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
                    document.getElementById('new-agent-err').textContent = '';
                    document.getElementById('new-agent-preview').textContent = '';
                    document.getElementById('new-agent-bar').classList.remove('visible');
                    // Drop any existing empty-state card.
                    document.querySelectorAll('.empty-state').forEach(n => n.remove());
                    addAgentPanel({
                        id: info.id, name: info.name, role: info.role,
                        state: { state: 'starting' },
                    });
                } else {
                    const body = await res.json().catch(() => ({error:'unknown'}));
                    document.getElementById('new-agent-err').textContent =
                        `${body.error}${body.missing ? ': ' + body.missing.join(', ') : ''}`;
                }
            } catch (e) {
                document.getElementById('new-agent-err').textContent = `network error: ${e}`;
            }
        }

        function addAgentPanel(agent) {
            const dashboard = document.getElementById('dashboard');
            const panel = createAgentPanel(agent);
            dashboard.appendChild(panel);

            const { term, fitAddon, nativeW, nativeH } = initTerminal(agent.id);
            agents.set(agent.id, { term, fitAddon, panel, evtSource: null, nativeW, nativeH });
            connectSSE(agent.id);
            setupControls(agent.id);
            refreshDashboardLayout();
            // If this is the first agent, flip to treemap mode + reveal
            // the filter bar. Otherwise the running refresh tick will
            // place the new tile within 1.5s.
            const fbar = document.getElementById('filter-bar');
            if (fbar) fbar.classList.add('visible');
            if (!layoutState.enabled) {
                enableTreemapMode();
            } else {
                applyLayout(computeLayout(dashboard));
            }
        }

        function refreshDashboardLayout() {
            const dashboard = document.getElementById('dashboard');
            const count = dashboard.querySelectorAll('.agent-panel').length;
            document.getElementById('agent-count').textContent = `${count} agent${count !== 1 ? 's' : ''}`;
            if (count <= 1) dashboard.className = 'dashboard cols-1';
            else if (count <= 2) dashboard.className = 'dashboard cols-2';
            else if (count <= 3) dashboard.className = 'dashboard cols-3';
            else dashboard.className = 'dashboard cols-4';
            // Grid columns changed — CSS scale needs to catch up. No fit,
            // no PTY resize (that's setFocus's job).
            updateTileScales();
        }

        function toggleConfig(agentId) {
            const editor = document.getElementById(`cfg-${agentId}`);
            if (!editor) return;
            if (!editor.classList.contains('visible')) {
                // Build fresh markup from the latest AgentInfo. Using innerHTML
                // keeps state simple: every open starts from the current spec.
                renderConfigEditor(editor, agentId);
            }
            editor.classList.toggle('visible');
        }

        function renderConfigEditor(editor, agentId) {
            const entry = agents.get(agentId);
            const info = entry?.info || null;
            const spec = info?.spec || null;
            if (spec) {
                editor.innerHTML = configEditorSpecHTML(agentId, info, spec);
                attachConfigPreview(agentId);
            } else {
                editor.innerHTML = configEditorLegacyHTML(agentId, info);
            }
        }

        function configEditorSpecHTML(id, info, spec) {
            const esc = (s) => (s == null ? '' : String(s).replace(/"/g, '&quot;'));
            const isRemote = spec.transport && spec.transport !== 'local';
            return `
                <label>Role
                    <select id="cfg-spec-role-${id}">
                        <option value="worker"${spec.role === 'worker' ? ' selected' : ''}>worker</option>
                        <option value="coordinator"${spec.role === 'coordinator' ? ' selected' : ''}>coordinator</option>
                        <option value="qa"${spec.role === 'qa' ? ' selected' : ''}>qa</option>
                        <option value="pm"${spec.role === 'pm' ? ' selected' : ''}>pm</option>
                    </select>
                </label>
                <label>Transport
                    <select id="cfg-spec-transport-${id}">
                        <option value="local"${spec.transport === 'local' ? ' selected' : ''}>local</option>
                        <option value="mosh"${spec.transport === 'mosh' ? ' selected' : ''}>mosh</option>
                        <option value="ssh"${spec.transport === 'ssh' ? ' selected' : ''}>ssh</option>
                    </select>
                </label>
                <div class="cfg-spec-remote" id="cfg-spec-remote-${id}" style="display:${isRemote ? '' : 'none'};">
                    <label>User <input id="cfg-spec-user-${id}" value="${esc(spec.user)}"></label>
                    <label>Host <input id="cfg-spec-host-${id}" value="${esc(spec.host)}"></label>
                </div>
                <label>Working dir <input id="cfg-spec-dir-${id}" value="${esc(spec.working_dir)}"></label>
                <label>Project <input id="cfg-spec-project-${id}" value="${esc(spec.project)}"></label>
                <label>Agent <input id="cfg-spec-agent-${id}" value="${esc(spec.agent)}"></label>
                <label>Agent args <input id="cfg-spec-args-${id}" value="${esc(spec.agent_args)}"></label>
                <div style="color:#4ecca3;font-family:monospace;font-size:11px;margin-top:4px;" id="cfg-spec-preview-${id}"></div>
                <div style="color:#fcd34d;font-size:11px;" id="cfg-spec-err-${id}"></div>

                    <button class="btn-cancel" onclick="toggleConfig('${id}')">Cancel</button>

        function configEditorLegacyHTML(id, info) {
            const role = info?.role || 'developer';
            const name = info?.name || id;
            return `
                <label>Name <input id="cfg-name-${id}" value="${name.replace(/"/g, '&quot;')}"></label>
                <label>Repo Path <input id="cfg-path-${id}" placeholder="/path/to/repo"></label>
                <label>Role
                    <select id="cfg-role-${id}">
                        <option value="developer" ${role === 'developer' ? 'selected' : ''}>Developer</option>
                        <option value="qa" ${role === 'qa' ? 'selected' : ''}>QA</option>
                        <option value="pm" ${role === 'pm' ? 'selected' : ''}>PM</option>
                        <option value="coordinator" ${role === 'coordinator' ? 'selected' : ''}>Coordinator</option>
                    </select>
                </label>
                <label>Launch Command <input id="cfg-launch-${id}" placeholder="bash"></label>
                <div class="cfg-btns">
                    <button class="btn-create" onclick="applyConfig('${id}')">Apply &amp; Restart</button>
                    <button class="btn-cancel" onclick="toggleConfig('${id}')">Cancel</button>
                </div>
            `;

        function readSpecFromEditor(id) {
            const v = (sel) => document.getElementById(sel)?.value.trim() || '';
            const role = v(`cfg-spec-role-${id}`);
            const transport = v(`cfg-spec-transport-${id}`);
            const user = v(`cfg-spec-user-${id}`);
            const host = v(`cfg-spec-host-${id}`);
            const dir = v(`cfg-spec-dir-${id}`);
            const project = v(`cfg-spec-project-${id}`);
            const agent = v(`cfg-spec-agent-${id}`);
            const args = v(`cfg-spec-args-${id}`);
            const t = transport || 'local';
            const isLocal = t === 'local';
            return {
                name: id, // immutable; id is the stable key
                role: role || 'worker',
                transport: t,
                host: isLocal ? null : (host || null),
                user: isLocal ? null : (user || null),
                working_dir: dir,
                project: project ? project : null,
                agent: agent,
                agent_args: args ? args : null,
            };
        }

        function specMissingFields(spec) {
            const missing = [];
            if (!spec.working_dir) missing.push('working_dir');
            if (!spec.agent) missing.push('agent');
            if (spec.transport !== 'local') {
                if (!spec.host) missing.push('host');
                if (!spec.user) missing.push('user');
            }
            return missing;
        }

        function specPreview(spec) {
            const tail = spec.agent_args ? `${spec.agent} ${spec.agent_args}` : spec.agent;
            const inner = `cd ${spec.working_dir || '<dir>'} && ${tail || '<agent>'}`;
            if (spec.transport === 'local') return inner;
            const user = spec.user || '<user>';
            const host = spec.host || '<host>';
            return `${spec.transport} ${user}@${host} -- tmux new-session -A -s atn-${spec.name} '${inner}'`;
        }

        function attachConfigPreview(id) {
            const refresh = () => {
                const spec = readSpecFromEditor(id);
                const preview = document.getElementById(`cfg-spec-preview-${id}`);
                if (preview) preview.textContent = specPreview(spec);
                const err = document.getElementById(`cfg-spec-err-${id}`);
                const missing = specMissingFields(spec);
                if (err) err.textContent = missing.length ? `missing: ${missing.join(', ')}` : '';
                // host/user block hides entirely when transport=local.
                const remote = spec.transport !== 'local';
                const block = document.getElementById(`cfg-spec-remote-${id}`);
                if (block) block.style.display = remote ? '' : 'none';
            };
            ['role', 'transport', 'user', 'host', 'dir', 'project', 'agent', 'args'].forEach((k) => {
                const el = document.getElementById(`cfg-spec-${k}-${id}`);
                if (el) {
                    el.addEventListener('input', refresh);
                    el.addEventListener('change', refresh);
                }
            });
            refresh();
        }

        async function applyConfig(agentId) {
            const entry = agents.get(agentId);
            const spec = entry?.info?.spec || null;
            let body;
            if (spec) {
                const edited = readSpecFromEditor(agentId);
                const missing = specMissingFields(edited);
                if (missing.length) {
                    const err = document.getElementById(`cfg-spec-err-${agentId}`);
                    if (err) err.textContent = `missing: ${missing.join(', ')}`;
                    return;
                }
                body = { spec: edited };
            } else {
                const name = document.getElementById(`cfg-name-${agentId}`)?.value.trim() || '';
                const repoPath = document.getElementById(`cfg-path-${agentId}`)?.value.trim() || '';
                const role = document.getElementById(`cfg-role-${agentId}`)?.value || '';
                const launch = document.getElementById(`cfg-launch-${agentId}`)?.value.trim() || '';
                body = {};
                if (name) body.name = name;
                if (repoPath) body.repo_path = repoPath;
                if (role) body.role = role;
                if (launch) body.launch_command = launch;
            }

            try {
                const res = await fetch(`${API_BASE}/api/agents/${agentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok) {
                    toggleConfig(agentId);
                    // Reconnect SSE after restart.
                    const agent = agents.get(agentId);
                    if (agent && agent.evtSource) agent.evtSource.close();
                    agent.term.clear();
                    setTimeout(() => connectSSE(agentId), 1000);
                    // Header display will refresh on the next pollStates tick.
                } else {
                    const text = await res.text().catch(() => '');
                    alert(`Failed to update agent config. ${text}`);
                }
            } catch (e) {
                alert(`Error updating config: ${e}`);
            }
        }

        async function saveToToml() {
            const btn = document.getElementById('btn-save-toml');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/agents/save`, { method: 'POST' });
                if (res.ok) {
                    btn.textContent = 'Saved!';
                } else {
                    const text = await res.text();
                    btn.textContent = 'Failed';
                    console.error('Save failed:', text);
                }
            } catch (_) {
                btn.textContent = 'Error';
            }
            setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 2000);
        }

        // ── View switching ─────────────────────────────────
        function switchView(view) {
            document.getElementById('dashboard').style.display = view === 'agents' ? '' : 'none';
            document.getElementById('graph-view').style.display = view === 'graph' ? '' : 'none';
            document.getElementById('saga-view').style.display = view === 'saga' ? '' : 'none';
            document.getElementById('wiki-view').style.display = view === 'wiki' ? '' : 'none';
            document.getElementById('events-view').style.display = view === 'events' ? '' : 'none';

        // ── Wiki state ─────────────────────────────────────
        let wikiCurrentPage = null;
        let wikiCurrentEtag = null;
        let wikiEditing = false;

        async function wikiLoadPageList() {
            try {
                const res = await fetch(`${API_BASE}/api/wiki`);
                const pages = await res.json();
                const list = document.getElementById('wiki-page-list');
                list.innerHTML = '';
                for (const title of pages) {
                    const item = document.createElement('div');
                    item.className = 'wiki-page-item' + (title === wikiCurrentPage ? ' active' : '');
                    item.textContent = title.replace(/__/g, '/');
                    item.onclick = () => wikiOpenPage(title);
                    list.appendChild(item);
                }
            } catch (_) {}
        }

        async function wikiOpenPage(title) {
            wikiEditing = false;
            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(title)}`);
                if (!res.ok) return;
                const data = await res.json();
                wikiCurrentPage = title;
                wikiCurrentEtag = res.headers.get('ETag');

                document.getElementById('wiki-page-title').textContent = data.title;
                document.getElementById('wiki-content').innerHTML = data.html;
                document.getElementById('wiki-content').style.display = '';
                document.getElementById('wiki-edit-area').style.display = 'none';
                document.getElementById('wiki-edit-btn').style.display = '';
                var openLink = document.getElementById('wiki-open-link');
                openLink.href = '/wiki/' + encodeURIComponent(data.title);
                openLink.style.display = '';
                document.getElementById('wiki-save-btn').style.display = 'none';
                document.getElementById('wiki-cancel-btn').style.display = 'none';
                document.getElementById('wiki-conflict').style.display = 'none';
                document.getElementById('wiki-editor').value = data.content;

                // Wire up wiki-link clicks
                document.querySelectorAll('#wiki-content a.wiki-link').forEach(a => {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const target = a.getAttribute('data-wiki-link');
                        if (target) wikiOpenPage(target);
                    });
                });

                wikiLoadPageList();
            } catch (_) {}
        }

        function wikiToggleEdit() {
            wikiEditing = true;
            document.getElementById('wiki-content').style.display = 'none';
            document.getElementById('wiki-edit-area').style.display = 'flex';
            document.getElementById('wiki-edit-btn').style.display = 'none';
            document.getElementById('wiki-save-btn').style.display = '';
            document.getElementById('wiki-cancel-btn').style.display = '';
        }

        function wikiCancelEdit() {
            wikiEditing = false;
            document.getElementById('wiki-content').style.display = '';
            document.getElementById('wiki-edit-area').style.display = 'none';
            document.getElementById('wiki-edit-btn').style.display = '';
            document.getElementById('wiki-save-btn').style.display = 'none';
            document.getElementById('wiki-cancel-btn').style.display = 'none';
            document.getElementById('wiki-conflict').style.display = 'none';
        }

        async function wikiSave() {
            if (!wikiCurrentPage) return;
            const content = document.getElementById('wiki-editor').value;
            const headers = { 'Content-Type': 'application/json' };
            if (wikiCurrentEtag) headers['If-Match'] = wikiCurrentEtag;

            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(wikiCurrentPage)}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ content }),
                });
                if (res.status === 409) {
                    const data = await res.json();
                    document.getElementById('wiki-conflict').textContent =
                        `Conflict: page was modified by another user. Current version shown below. Your edits are preserved in the editor.`;
                    document.getElementById('wiki-conflict').style.display = '';
                    wikiCurrentEtag = data.current_etag;
                    return;
                }
                if (res.ok) {
                    wikiCurrentEtag = res.headers.get('ETag');
                    wikiOpenPage(wikiCurrentPage);
                }
            } catch (_) {}
        }

        async function wikiNewPage() {
            const input = document.getElementById('wiki-new-title');
            const title = input.value.trim();
            if (!title) return;

            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(title)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `# ${title}\n\n` }),
                });
                if (res.ok || res.status === 201) {
                    input.value = '';
                    wikiOpenPage(title);
                }
            } catch (_) {}
        }

        // ── Saga ──────────────────────────────────────────────
        let sagaCurrentTaskType = null;

        async function sagaRefresh() {
            const grid = document.getElementById('saga-grid');
            try {
                // Fetch agent list
                const agentRes = await fetch(`${API_BASE}/api/agents`);
                if (!agentRes.ok) return;
                const agentList = await agentRes.json();

                // Fetch per-agent sagas in parallel
                const sagaResults = await Promise.all(
                    agentList.map(async (agent) => {
                        try {
                            const res = await fetch(`${API_BASE}/api/agents/${agent.id}/saga`);
                            if (!res.ok) return { agent, data: null };
                            const data = await res.json();
                            return { agent, data };
                        } catch (_) {
                            return { agent, data: null };
                        }
                    })
                );

                // Filter to agents that have a saga, coordinator first
                const withSagas = sagaResults
                    .filter(r => r.data && r.data.saga)
                    .sort((a, b) => {
                        if (a.agent.role === 'coordinator') return -1;
                        if (b.agent.role === 'coordinator') return 1;
                        return a.agent.name.localeCompare(b.agent.name);
                    });

                if (withSagas.length === 0) {
                    grid.className = 'saga-grid saga-cols-1';
                    grid.innerHTML = '<div class="saga-none">No agent sagas found. Each agent needs a .agentrail/ directory in its repo_path.</div>';
                    return;
                }

                const cols = Math.min(withSagas.length, 4);
                grid.className = `saga-grid saga-cols-${cols}`;
                grid.innerHTML = '';

                for (const { agent, data } of withSagas) {
                    const panel = renderSagaPanel(agent, data);
                    grid.appendChild(panel);
                }
            } catch (_) {
                grid.innerHTML = '<div class="saga-none">Failed to load sagas.</div>';
            }
        }

        function renderSagaPanel(agent, data) {
            const panel = document.createElement('div');
            panel.className = 'saga-panel';

            const saga = data.saga;
            const steps = data.steps;
            const completed = steps.filter(s => s.status === 'completed').length;
            const total = steps.length;
            const current = steps.find(s => s.status === 'in-progress');
            const statusCls = saga.status === 'completed' ? 'saga-completed' : 'saga-active';

            let html = `
                <div class="saga-panel-header">
                    <span class="saga-agent-name">${agent.name}</span>
                    <span class="saga-agent-role">${agent.role}</span>
                    <span class="spacer"></span>
                    <span class="saga-status-badge ${statusCls}">${saga.status}</span>
                </div>
                <div class="saga-panel-body">
                    <div class="saga-info">
                        <div class="saga-stat"><div class="saga-stat-label">Saga</div><div class="saga-stat-value">${saga.name}</div></div>
                        <div class="saga-stat"><div class="saga-stat-label">Progress</div><div class="saga-stat-value">${completed} / ${total}</div></div>
                        <div class="saga-stat"><div class="saga-stat-label">Current</div><div class="saga-stat-value">${current ? current.slug : 'none'}</div></div>
                    </div>
                    <div class="saga-steps">`;

            for (const step of steps) {
                const sCls = 'step-' + step.status.replace(/_/g, '-');
                const isCurrent = step.status === 'in-progress';
                const desc = step.description.length > 100 ? step.description.slice(0, 100) + '...' : step.description;
                html += `
                        <div class="step-card ${sCls}${isCurrent ? ' step-current' : ''}">
                            <div class="step-number">${step.number}</div>
                            <div class="step-body">
                                <div class="step-header">
                                    <span class="step-slug">${step.slug}</span>
                                    <span class="step-status">${step.status}</span>
                                </div>
                                <div class="step-desc">${desc}</div>
                                <div class="step-meta">
                                    ${step.task_type ? `<span>Task: ${step.task_type}</span>` : ''}
                                    ${step.completed_at ? `<span>Done: ${step.completed_at}</span>` : ''}
                                </div>
                            </div>
                        </div>`;
            }

            html += '</div>'; // close saga-steps

            // Trajectories
            if (data.trajectories.length > 0) {
                html += `<div class="saga-trajectories">
                    <h3>Trajectories</h3>`;
                for (const t of data.trajectories) {
                    const rewardCls = t.reward > 0 ? 'traj-reward-pos' : (t.reward < 0 ? 'traj-reward-neg' : 'traj-reward-zero');
                    html += `
                    <div class="traj-card">
                        <div class="traj-action">${t.action}</div>
                        <div class="traj-meta">
                            <span class="${rewardCls}">Reward: ${t.reward > 0 ? '+' : ''}${t.reward}</span>
                            &middot; ${t.result} &middot; ${t.timestamp}
                        </div>
                    </div>`;
                }
                html += '</div>'; // close saga-trajectories
            }

            html += '</div>'; // close saga-panel-body
            panel.innerHTML = html;
            return panel;
        }

        async function sagaDistill() {
            if (!sagaCurrentTaskType) return;
            const btn = document.getElementById('saga-distill-btn');
            btn.textContent = 'Distilling...';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/saga/distill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_type: sagaCurrentTaskType }),
                });
                const data = await res.json();
                if (data.exit_code === 0) {
                    btn.textContent = 'Distilled!';
                } else {
                    btn.textContent = 'Distill Failed';
                }
            } catch (_) {
                btn.textContent = 'Error';
            }
            setTimeout(() => { btn.textContent = 'Distill Skill'; btn.disabled = false; }, 3000);
        }

        // ── Events log ────────────────────────────────────────
        let eventsLastIndex = 0;

        const KIND_LABELS = {
            feature_request: 'Feature Request',
            bug_fix_request: 'Bug Fix',
            completion_notice: 'Completed',
            blocked_notice: 'Blocked',
            needs_info: 'Needs Info',
            verification_request: 'Verify',
        };

        function kindLabel(kind) { return KIND_LABELS[kind] || kind; }

        function decisionClass(decision) {
            if (decision.startsWith('deliver')) return 'decision-deliver';
            if (decision.startsWith('escalate')) return 'decision-escalate';
            return 'decision-broadcast';
        }

        function decisionLabel(decision) {
            if (decision.startsWith('deliver:')) return 'Delivered to ' + decision.slice(8);
            if (decision.startsWith('escalate:')) return 'Escalated: ' + decision.slice(9);
            return 'Broadcast';
        }

        async function eventsRefresh() {
            try {
                const res = await fetch(`${API_BASE}/api/events?since=0`);
                if (!res.ok) return;
                const entries = await res.json();
                const outbound = document.getElementById('events-outbound');
                const inbound = document.getElementById('events-inbound');
                const escDiv = document.getElementById('events-escalations');
                outbound.innerHTML = '';
                inbound.innerHTML = '';
                escDiv.innerHTML = '';

                // Show escalations at the top
                const escalations = entries.filter(e => e.decision.startsWith('escalate'));
                for (const esc of escalations) {
                    const banner = document.createElement('div');
                    banner.className = 'escalation-banner';
                    banner.innerHTML = `<span class="esc-icon">!</span>
                        <span><strong>Human attention needed:</strong> ${esc.event.summary}
                        (from ${esc.event.source_agent}, target: ${esc.event.target_agent || 'none'}) &mdash; ${esc.decision.slice(9)}</span>`;
                    escDiv.appendChild(banner);
                }

                // Split events into outbound (to non-coordinator) and inbound (to coordinator)
                for (let i = entries.length - 1; i >= 0; i--) {
                    const entry = entries[i];
                    const ev = entry.event;
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-header">
                            <span class="event-kind kind-${ev.kind}">${kindLabel(ev.kind)}</span>
                            <span class="event-decision ${decisionClass(entry.decision)}">${decisionLabel(entry.decision)}</span>
                        </div>
                        <div class="event-summary">${ev.summary}</div>
                        <div class="event-meta">
                            <span>From: ${ev.source_agent}</span>
                            <span>Target: ${ev.target_agent || '(broadcast)'}</span>
                            <span>${entry.logged_at.slice(11, 19)}</span>
                        </div>`;
                    const isInbound = ev.target_agent === 'coordinator';
                    (isInbound ? inbound : outbound).appendChild(card);
                }
                eventsLastIndex = entries.length;
            } catch (_) {}
        }

        // Poll events every 5 seconds for new escalations (shown as badge on tab)
        let eventsPollCount = 0;
        setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/api/events?since=${eventsLastIndex}`);
                if (!res.ok) return;
                const entries = await res.json();
                if (entries.length > 0) {
                    eventsPollCount += entries.length;
                    eventsLastIndex += entries.length;
                    const tab = document.getElementById('tab-events');
                    const hasEscalation = entries.some(e => e.decision.startsWith('escalate'));
                    if (hasEscalation) {
                        tab.style.borderColor = '#e94560';
                        tab.style.color = '#e94560';
                        playNotification();
                    }
                    // If events view is active, refresh it
                    if (document.getElementById('events-view').style.display !== 'none') {
                        eventsRefresh();
                    }
                }
            } catch (_) {}
        }, 5000);

        // ── Dependency graph ─────────────────────────────────
        const STATE_COLORS = {
            starting: '#9ca3af', running: '#34d399', idle: '#60a5fa',
            awaiting_human_input: '#fbbf24', busy: '#a78bfa', blocked: '#fca5a5',
            completed_task: '#6ee7b7', error: '#f87171', disconnected: '#6b7280',
        };
        const STATE_BG = {
            starting: '#1f2937', running: '#064e3b', idle: '#1e3a5f',
            awaiting_human_input: '#78350f', busy: '#4c1d95', blocked: '#7f1d1d',
            completed_task: '#064e3b', error: '#7f1d1d', disconnected: '#1f2937',
        };

        async function graphRefresh() {
            try {
                const res = await fetch(`${API_BASE}/api/agents/graph`);
                if (!res.ok) return;
                const nodes = await res.json();
                renderGraph(nodes);
            } catch (_) {}
        }

        function renderGraph(nodes) {
            const canvas = document.getElementById('graph-canvas');
            if (nodes.length === 0) {
                canvas.innerHTML = '<div style="color:#666;font-size:14px;">No agents running.</div>';
                return;
            }

            // Sort: coordinator first
            nodes.sort((a, b) => {
                if (a.role === 'coordinator') return -1;
                if (b.role === 'coordinator') return 1;
                return a.name.localeCompare(b.name);
            });

            const coordinator = nodes.find(n => n.role === 'coordinator');
            const others = nodes.filter(n => n.role !== 'coordinator');

            const nodeW = 180, nodeH = 50, padX = 60, padY = 50;
            // Hub layout: coordinator on left, others stacked on right
            const svgW = coordinator ? (nodeW + padX) * 2 + padX * 2 : (nodes.length * (nodeW + padX) + padX);
            const svgH = Math.max(others.length, 1) * (nodeH + padY) + padY;

            const positions = {};
            if (coordinator) {
                // Coordinator centered vertically on left
                positions[coordinator.id] = {
                    x: padX,
                    y: (svgH - nodeH) / 2,
                };
                // Others stacked on right
                others.forEach((n, i) => {
                    positions[n.id] = {
                        x: padX * 2 + nodeW + padX,
                        y: padY + i * (nodeH + padY),
                    };
                });
            } else {
                nodes.forEach((n, i) => {
                    positions[n.id] = { x: padX, y: padY + i * (nodeH + padY) };
                });
            }

            let svg = `<svg class="graph-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560" /></marker></defs>`;

            // Draw edges: coordinator → each other agent (bidirectional)
            if (coordinator) {
                const cp = positions[coordinator.id];
                for (const other of others) {
                    const op = positions[other.id];
                    // Outbound: coordinator right edge → other left edge
                    svg += `<line class="graph-edge" x1="${cp.x + nodeW}" y1="${cp.y + nodeH / 2}" x2="${op.x}" y2="${op.y + nodeH / 2}" marker-end="url(#arrowhead)" />`;
                }
            }

            // Also draw any explicit blocked_on edges
            for (const node of nodes) {
                const to = positions[node.id];
                if (!to) continue;
                for (const dep of node.blocked_on) {
                    const from = positions[dep];
                    if (!from) continue;
                    svg += `<line class="graph-edge" x1="${from.x + nodeW / 2}" y1="${from.y + nodeH}" x2="${to.x + nodeW / 2}" y2="${to.y}" marker-end="url(#arrowhead)" />`;
                }
            }

            // Draw nodes
            for (const node of nodes) {
                const pos = positions[node.id];
                const color = STATE_COLORS[node.state] || '#888';
                const bg = STATE_BG[node.state] || '#16213e';
                const isCoord = node.role === 'coordinator';
                const stroke = isCoord ? '#e94560' : color;
                const strokeW = isCoord ? 2 : 1;
                svg += `<g class="graph-node">`;
                svg += `<rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" fill="${bg}" stroke="${stroke}" stroke-width="${strokeW}" rx="4" />`;
                svg += `<text x="${pos.x + nodeW / 2}" y="${pos.y + 20}" text-anchor="middle" font-weight="600">${node.name}</text>`;
                svg += `<text x="${pos.x + nodeW / 2}" y="${pos.y + 38}" text-anchor="middle" font-size="11" fill="${color}">${stateLabel({state: node.state})}</text>`;
                svg += `</g>`;
            }

            svg += `</svg>`;
            canvas.innerHTML = svg;
        }

        // ── Notification sounds ──────────────────────────────
        // Use Web Audio API to generate a short attention tone (no external files needed).
        let audioCtx = null;
        let notificationsEnabled = true;
        const prevAgentStates = new Map();

        function playNotification() {
            if (!notificationsEnabled) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (_) {}
        }

        // Check for state changes that need attention during polling.
        const origPollStates = pollStates;
        pollStates = async function() {
            try {
                const res = await fetch(`${API_BASE}/api/agents`);
                if (!res.ok) return;
                const list = await res.json();
                for (const agent of list) {
                    const sk = stateKey(agent.state);
                    const badge = document.getElementById(`badge-${agent.id}`);
                    if (badge) {
                        badge.className = `state-badge state-${sk}`;
                        badge.textContent = stateLabel(agent.state);
                    }
                    // Play notification on attention-needing state transitions.
                    const prev = prevAgentStates.get(agent.id);
                    if (prev && prev !== sk && (sk === 'awaiting_human_input' || sk === 'error' || sk === 'blocked')) {
                        playNotification();
                    }
                    prevAgentStates.set(agent.id, sk);
                }
            } catch (_) {}
        };
    </script>
</body>
</html>
