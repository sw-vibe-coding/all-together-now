<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Together Now</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
        header .agent-count { font-size: 13px; color: #888; }

        .dashboard { flex: 1; display: grid; gap: 8px; padding: 8px; min-height: 0; overflow: auto; }
        .dashboard.cols-1 { grid-template-columns: 1fr; }
        .dashboard.cols-2 { grid-template-columns: 1fr 1fr; }
        .dashboard.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .dashboard.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .agent-panel { display: flex; flex-direction: column; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; min-height: 300px; overflow: auto; }
        .agent-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        .agent-header .agent-name { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        .agent-header .agent-role { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .agent-header .spacer { flex: 1; }

        .state-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
        .state-starting    { background: #1f2937; color: #9ca3af; }
        .state-running     { background: #064e3b; color: #34d399; }
        .state-idle        { background: #1e3a5f; color: #60a5fa; }
        .state-awaiting_human_input { background: #78350f; color: #fbbf24; }
        .state-busy        { background: #4c1d95; color: #a78bfa; }
        .state-blocked     { background: #7f1d1d; color: #fca5a5; }
        .state-completed_task { background: #064e3b; color: #6ee7b7; }
        .state-error       { background: #7f1d1d; color: #f87171; }
        .state-disconnected { background: #1f2937; color: #6b7280; }

        .agent-terminal { flex: 1; min-height: 0; background: #0d1117; cursor: text; overflow: auto; }
        .agent-terminal:focus-within { outline: 1px solid #e94560; outline-offset: -1px; }
        .agent-controls { display: flex; gap: 6px; padding: 6px 8px; align-items: center; border-top: 1px solid #0f3460; flex-shrink: 0; }
        .agent-controls input { flex: 1; padding: 6px 10px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 13px; outline: none; }
        .agent-controls input:focus { border-color: #e94560; }
        .agent-controls button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-send { background: #4ecca3; color: #1a1a2e; }
        .btn-send:hover { background: #3db892; }
        .btn-ctrl-c { background: #e94560; color: #fff; font-size: 11px; padding: 6px 8px; }
        .btn-ctrl-c:hover { background: #d63851; }

        .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .conn-dot.connected { background: #4ecca3; }
        .conn-dot.disconnected { background: #e94560; }

        /* View tabs */
        .view-tabs { display: flex; gap: 4px; margin-left: auto; }
        .view-tab { padding: 4px 12px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #888; cursor: pointer; font-size: 12px; }
        .view-tab.active { background: #0f3460; color: #e0e0e0; }
        .view-tab:hover { color: #e0e0e0; }

        /* Wiki browser */
        .wiki-container { flex: 1; display: flex; min-height: 0; overflow: hidden; }
        .wiki-sidebar { width: 220px; border-right: 1px solid #0f3460; overflow-y: auto; padding: 8px 0; flex-shrink: 0; }
        .wiki-sidebar h3 { font-size: 12px; color: #888; padding: 4px 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .wiki-page-item { padding: 6px 12px; cursor: pointer; font-size: 13px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wiki-page-item:hover { background: #1e3a5f; }
        .wiki-page-item.active { background: #0f3460; color: #e94560; }
        .wiki-main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
        .wiki-toolbar { padding: 8px 12px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .wiki-toolbar .page-title { font-size: 14px; font-weight: 600; color: #c9d1d9; flex: 1; }
        .wiki-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .wiki-toolbar button:hover { background: #0f3460; }
        .wiki-toolbar button.btn-save { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; }
        .wiki-toolbar button.btn-save:hover { background: #3db892; }
        .wiki-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .wiki-content h1, .wiki-content h2, .wiki-content h3 { color: #c9d1d9; margin: 16px 0 8px; }
        .wiki-content h1 { font-size: 22px; border-bottom: 1px solid #0f3460; padding-bottom: 6px; }
        .wiki-content h2 { font-size: 18px; }
        .wiki-content p { margin: 8px 0; line-height: 1.6; }
        .wiki-content ul, .wiki-content ol { margin: 8px 0; padding-left: 24px; }
        .wiki-content a.wiki-link { color: #4ecca3; text-decoration: none; cursor: pointer; }
        .wiki-content a.wiki-link:hover { text-decoration: underline; }
        .wiki-edit-area { flex: 1; display: flex; flex-direction: column; padding: 8px; min-height: 0; }
        .wiki-edit-area textarea { flex: 1; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 12px; resize: none; outline: none; }
        .wiki-edit-area textarea:focus { border-color: #e94560; }
        .wiki-conflict { background: #7f1d1d; border: 1px solid #f87171; border-radius: 4px; padding: 10px 14px; margin: 8px; color: #fca5a5; font-size: 13px; }
        .wiki-new-page { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #0f3460; }
        .wiki-new-page input { flex: 1; padding: 4px 8px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; outline: none; }
        .wiki-new-page button { padding: 4px 10px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* Events log */
        .events-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }
        .events-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; flex-shrink: 0; }
        .events-toolbar h2 { font-size: 16px; color: #c9d1d9; flex: 1; }
        .events-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .events-toolbar button:hover { background: #0f3460; }
        .events-columns { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-height: 0; overflow: hidden; }
        .events-column { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .events-column-header { font-size: 13px; font-weight: 600; color: #c9d1d9; padding: 6px 10px; background: #16213e; border: 1px solid #0f3460; border-radius: 6px 6px 0 0; flex-shrink: 0; }
        .events-column-header .col-arrow { margin: 0 4px; color: #e94560; }
        .events-list { flex: 1; overflow-y: auto; }
        .event-card { border: 1px solid #0f3460; border-radius: 6px; background: #16213e; padding: 10px 14px; margin-bottom: 6px; }
        .event-card .event-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .event-card .event-kind { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .kind-feature_request { background: #1e3a5f; color: #60a5fa; }
        .kind-bug_fix_request { background: #7f1d1d; color: #fca5a5; }
        .kind-completion_notice { background: #064e3b; color: #6ee7b7; }
        .kind-blocked_notice { background: #78350f; color: #fbbf24; }
        .kind-needs_info { background: #4c1d95; color: #a78bfa; }
        .kind-verification_request { background: #064e3b; color: #34d399; }
        .event-card .event-summary { font-size: 13px; color: #e0e0e0; }
        .event-card .event-meta { font-size: 11px; color: #888; margin-top: 4px; display: flex; gap: 12px; }
        .event-card .event-decision { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .decision-deliver { background: #064e3b; color: #34d399; }
        .decision-escalate { background: #7f1d1d; color: #fca5a5; }
        .decision-broadcast { background: #1e3a5f; color: #60a5fa; }
        .escalation-banner { background: #7f1d1d; border: 1px solid #f87171; border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; color: #fca5a5; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .escalation-banner .esc-icon { font-size: 18px; }

        /* Saga view */
        .saga-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }
        .saga-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; flex-shrink: 0; }
        .saga-toolbar h2 { font-size: 16px; color: #c9d1d9; flex: 1; }
        .saga-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .saga-toolbar button:hover { background: #0f3460; }
        .saga-toolbar .btn-distill { background: #4c1d95; color: #a78bfa; border-color: #4c1d95; }
        .saga-toolbar .btn-distill:hover { background: #5b21b6; }
        .saga-grid { flex: 1; display: grid; gap: 8px; min-height: 0; overflow: auto; }
        .saga-grid.saga-cols-1 { grid-template-columns: 1fr; }
        .saga-grid.saga-cols-2 { grid-template-columns: 1fr 1fr; }
        .saga-grid.saga-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .saga-grid.saga-cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .saga-panel { display: flex; flex-direction: column; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; min-height: 0; overflow: hidden; }
        .saga-panel-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
        .saga-panel-header .saga-agent-name { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        .saga-panel-header .saga-agent-role { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .saga-panel-header .spacer { flex: 1; }
        .saga-panel-header .saga-status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .saga-panel-header .saga-active { background: #064e3b; color: #34d399; }
        .saga-panel-header .saga-completed { background: #1e3a5f; color: #60a5fa; }
        .saga-panel-body { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 8px; }
        .saga-info { display: flex; gap: 12px; padding: 0 0 8px; flex-shrink: 0; flex-wrap: wrap; }
        .saga-info .saga-stat { background: #0d1117; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 10px; }
        .saga-info .saga-stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .saga-info .saga-stat-value { font-size: 14px; color: #c9d1d9; font-weight: 600; }
        .saga-steps { flex: 1; overflow-y: auto; padding: 4px 0; }
        .step-card { border: 1px solid #0f3460; border-radius: 6px; background: #0d1117; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 12px; }
        .step-card.step-current { border-color: #e94560; background: #1e1a2e; }
        .step-number { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
        .step-pending .step-number { background: #1f2937; color: #6b7280; }
        .step-in-progress .step-number { background: #4c1d95; color: #a78bfa; }
        .step-completed .step-number { background: #064e3b; color: #6ee7b7; }
        .step-blocked .step-number { background: #7f1d1d; color: #fca5a5; }
        .step-body { flex: 1; min-width: 0; }
        .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .step-slug { font-size: 14px; font-weight: 600; color: #c9d1d9; }
        .step-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .step-pending .step-status { background: #1f2937; color: #9ca3af; }
        .step-in-progress .step-status { background: #4c1d95; color: #a78bfa; }
        .step-completed .step-status { background: #064e3b; color: #6ee7b7; }
        .step-blocked .step-status { background: #7f1d1d; color: #fca5a5; }
        .step-desc { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .step-meta { font-size: 11px; color: #666; margin-top: 2px; display: flex; gap: 12px; }
        .saga-trajectories { flex-shrink: 0; max-height: 200px; overflow-y: auto; border-top: 1px solid #0f3460; margin-top: 8px; padding-top: 8px; }
        .saga-trajectories h3 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .traj-card { background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; padding: 6px 10px; margin-bottom: 4px; font-size: 12px; }
        .traj-card .traj-action { color: #c9d1d9; }
        .traj-card .traj-meta { color: #666; font-size: 11px; margin-top: 2px; }
        .traj-reward-pos { color: #6ee7b7; }
        .traj-reward-neg { color: #fca5a5; }
        .traj-reward-zero { color: #9ca3af; }
        .saga-none { color: #666; font-size: 14px; padding: 40px; text-align: center; }

        /* Restart / Stop / Delete buttons */
        .btn-restart { background: #1e3a5f; color: #60a5fa; font-size: 11px; padding: 6px 8px; }
        .btn-restart:hover { background: #264f78; }
        .btn-stop { background: #78350f; color: #fbbf24; font-size: 11px; padding: 6px 8px; }
        .btn-stop:hover { background: #92400e; }
        .btn-delete { background: #7f1d1d; color: #fca5a5; font-size: 11px; padding: 6px 8px; }
        .btn-delete:hover { background: #991b1b; }
        .btn-edit-cfg { background: transparent; color: #888; font-size: 11px; padding: 6px 8px; border: 1px solid #0f3460; }
        .btn-edit-cfg:hover { background: #0f3460; color: #c9d1d9; }
        .btn-save-cfg { background: #4ecca3; color: #1a1a2e; font-size: 12px; padding: 4px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-save-cfg:hover { background: #3db892; }

        /* New agent form */
        .new-agent-bar { padding: 8px; border-bottom: 1px solid #0f3460; background: #16213e; flex-shrink: 0; display: none; }
        .new-agent-bar.visible { display: block; }
        .new-agent-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .new-agent-form input, .new-agent-form select { padding: 5px 8px; background: #0d1117; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 12px; outline: none; }
        .new-agent-form input:focus { border-color: #e94560; }
        .new-agent-form .field-id { width: 100px; }
        .new-agent-form .field-name { width: 140px; }
        .new-agent-form .field-path { width: 200px; }
        .new-agent-form .field-launch { width: 120px; }
        .new-agent-form button { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 500; }
        .new-agent-form .btn-create { background: #4ecca3; color: #1a1a2e; }
        .new-agent-form .btn-create:hover { background: #3db892; }
        .new-agent-form .btn-cancel { background: transparent; color: #888; border: 1px solid #0f3460; }

        /* Agent config editor overlay */
        .agent-config-editor { display: none; padding: 8px; border-top: 1px solid #0f3460; background: #0d1117; font-size: 12px; }
        .agent-config-editor.visible { display: block; }
        .agent-config-editor label { display: block; color: #888; margin-top: 4px; font-size: 11px; }
        .agent-config-editor input, .agent-config-editor select { width: 100%; padding: 4px 6px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 3px; color: #e0e0e0; font-size: 12px; outline: none; margin-top: 2px; }
        .agent-config-editor .cfg-btns { display: flex; gap: 6px; margin-top: 6px; }
        .agent-config-editor .cfg-btns button { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Dependency graph */
        .graph-container { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; padding: 8px; }
        .graph-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; flex-shrink: 0; }
        .graph-toolbar h2 { font-size: 16px; color: #c9d1d9; flex: 1; }
        .graph-toolbar button { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #c9d1d9; cursor: pointer; font-size: 12px; }
        .graph-toolbar button:hover { background: #0f3460; }
        .graph-canvas { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; }
        .graph-svg { max-width: 100%; max-height: 100%; }
        .graph-node { cursor: pointer; }
        .graph-node rect { stroke-width: 2; rx: 8; ry: 8; }
        .graph-node text { fill: #c9d1d9; font-size: 13px; font-family: system-ui, sans-serif; }
        .graph-edge { stroke: #e94560; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
</head>
<body>
    <header>
        <h1>All Together Now</h1>
        <span class="agent-count" id="agent-count"></span>
        <button class="btn-save-cfg" id="btn-save-toml" onclick="saveToToml()" title="Save current agents to agents.toml">Save</button>
        <button style="padding:4px 10px;border:1px solid #0f3460;border-radius:4px;background:transparent;color:#4ecca3;cursor:pointer;font-size:12px;" id="btn-new-agent" onclick="toggleNewAgent()">+ Agent</button>
        <div class="view-tabs">
            <button class="view-tab active" id="tab-agents" onclick="switchView('agents')">Agents</button>
            <button class="view-tab" id="tab-graph" onclick="switchView('graph')">Graph</button>
            <button class="view-tab" id="tab-saga" onclick="switchView('saga')">Saga</button>
            <button class="view-tab" id="tab-wiki" onclick="switchView('wiki')">Wiki</button>
            <button class="view-tab" id="tab-events" onclick="switchView('events')">Events</button>
        </div>
    </header>
    <div class="new-agent-bar" id="new-agent-bar">
        <div class="new-agent-form">
            <input class="field-id" id="new-id" placeholder="agent-id">
            <input class="field-name" id="new-name" placeholder="Display Name">
            <input class="field-path" id="new-path" placeholder="Repo path (e.g. . or /abs/path)">
            <select id="new-role">
                <option value="developer">Developer</option>
                <option value="qa">QA</option>
                <option value="pm">PM</option>
                <option value="coordinator">Coordinator</option>
            </select>
            <input class="field-launch" id="new-launch" placeholder="Launch cmd" value="bash">
            <button class="btn-create" onclick="createAgent()">Create</button>
            <button class="btn-cancel" onclick="toggleNewAgent()">Cancel</button>
        </div>
    </div>
    <div class="dashboard" id="dashboard"></div>
    <div class="wiki-container" id="wiki-view" style="display:none;">
        <div class="wiki-sidebar">
            <h3>Pages</h3>
            <div id="wiki-page-list"></div>
            <div class="wiki-new-page">
                <input type="text" id="wiki-new-title" placeholder="New page title...">
                <button onclick="wikiNewPage()">+</button>
            </div>
        </div>
        <div class="wiki-main">
            <div class="wiki-toolbar">
                <span class="page-title" id="wiki-page-title">Select a page</span>
                <button id="wiki-edit-btn" onclick="wikiToggleEdit()" style="display:none;">Edit</button>
                <button id="wiki-save-btn" class="btn-save" onclick="wikiSave()" style="display:none;">Save</button>
                <button id="wiki-cancel-btn" onclick="wikiCancelEdit()" style="display:none;">Cancel</button>
            </div>
            <div id="wiki-conflict" class="wiki-conflict" style="display:none;"></div>
            <div class="wiki-content" id="wiki-content"></div>
            <div class="wiki-edit-area" id="wiki-edit-area" style="display:none;">
                <textarea id="wiki-editor"></textarea>
            </div>
        </div>
    </div>

    <div class="saga-container" id="saga-view" style="display:none;">
        <div class="saga-toolbar">
            <h2>Saga Progress</h2>
            <button onclick="sagaRefresh()">Refresh</button>
        </div>
        <div class="saga-grid" id="saga-grid"></div>
    </div>

    <div class="graph-container" id="graph-view" style="display:none;">
        <div class="graph-toolbar">
            <h2>Agent Dependency Graph</h2>
            <button onclick="graphRefresh()">Refresh</button>
        </div>
        <div class="graph-canvas" id="graph-canvas"></div>
    </div>

    <div class="events-container" id="events-view" style="display:none;">
        <div class="events-toolbar">
            <h2>Push Event Log</h2>
            <button onclick="eventsRefresh()">Refresh</button>
        </div>
        <div id="events-escalations"></div>
        <div class="events-columns">
            <div class="events-column">
                <div class="events-column-header">Coordinator <span class="col-arrow">&rarr;</span> Agents</div>
                <div class="events-list" id="events-outbound"></div>
            </div>
            <div class="events-column">
                <div class="events-column-header">Agents <span class="col-arrow">&rarr;</span> Coordinator</div>
                <div class="events-list" id="events-inbound"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script>
        const API_BASE = '';
        const agents = new Map(); // id -> { term, fitAddon, evtSource, panel }

        const STATE_LABELS = {
            starting: 'Starting',
            running: 'Running',
            idle: 'Idle',
            awaiting_human_input: 'Awaiting Input',
            busy: 'Busy',
            blocked: 'Blocked',
            completed_task: 'Completed',
            error: 'Error',
            disconnected: 'Disconnected',
        };

        function stateKey(stateObj) {
            if (typeof stateObj === 'string') return stateObj;
            if (stateObj && stateObj.state) return stateObj.state;
            return 'starting';
        }

        function stateLabel(stateObj) {
            const key = stateKey(stateObj);
            return STATE_LABELS[key] || key;
        }

        function createAgentPanel(agent) {
            const panel = document.createElement('div');
            panel.className = 'agent-panel';
            panel.id = `panel-${agent.id}`;

            const sk = stateKey(agent.state);

            panel.innerHTML = `
                <div class="agent-header">
                    <span class="agent-name">${agent.name}</span>
                    <span class="agent-role">${agent.role}</span>
                    <span id="saga-badge-${agent.id}" style="font-size:11px;color:#a78bfa;"></span>
                    <span class="spacer"></span>
                    <span class="conn-dot disconnected" id="conn-${agent.id}"></span>
                    <span class="state-badge state-${sk}" id="badge-${agent.id}">${stateLabel(agent.state)}</span>
                </div>
                <div class="agent-terminal" id="term-${agent.id}"></div>
                <div class="agent-controls">
                    <input type="text" id="input-${agent.id}" placeholder="Command for ${agent.name}...">
                    <button class="btn-send" data-agent="${agent.id}">Send</button>
                    <button class="btn-ctrl-c" data-agent="${agent.id}">^C</button>
                    <button class="btn-restart" data-agent="${agent.id}">Restart</button>
                    <button class="btn-stop" data-agent="${agent.id}">Stop</button>
                    <button class="btn-edit-cfg" data-agent="${agent.id}">Config</button>
                    <button class="btn-delete" data-agent="${agent.id}">Delete</button>
                </div>
                <div class="agent-config-editor" id="cfg-${agent.id}">
                    <label>Name <input id="cfg-name-${agent.id}" value="${agent.name}"></label>
                    <label>Repo Path <input id="cfg-path-${agent.id}" placeholder="/path/to/repo"></label>
                    <label>Role
                        <select id="cfg-role-${agent.id}">
                            <option value="developer" ${agent.role === 'developer' ? 'selected' : ''}>Developer</option>
                            <option value="qa" ${agent.role === 'qa' ? 'selected' : ''}>QA</option>
                            <option value="pm" ${agent.role === 'pm' ? 'selected' : ''}>PM</option>
                            <option value="coordinator" ${agent.role === 'coordinator' ? 'selected' : ''}>Coordinator</option>
                        </select>
                    </label>
                    <label>Launch Command <input id="cfg-launch-${agent.id}" placeholder="bash"></label>
                    <div class="cfg-btns">
                        <button class="btn-create" onclick="applyConfig('${agent.id}')">Apply & Restart</button>
                        <button class="btn-cancel" onclick="toggleConfig('${agent.id}')">Cancel</button>
                    </div>
                </div>
            `;
            return panel;
        }

        function initTerminal(agentId) {
            const term = new Terminal({
                cursorBlink: true,
                fontSize: 13,
                scrollback: 5000,
                fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
                theme: {
                    background: '#0d1117',
                    foreground: '#c9d1d9',
                    cursor: '#e94560',
                    selectionBackground: '#264f78',
                },
            });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);

            const container = document.getElementById(`term-${agentId}`);
            term.open(container);
            fitAddon.fit();
            syncPtySize(agentId, term);
            return { term, fitAddon };
        }

        function syncPtySize(agentId, term) {
            fetch(`${API_BASE}/api/agents/${agentId}/resize`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cols: term.cols, rows: term.rows }),
            }).catch(() => {});
        }

        function connectSSE(agentId) {
            const connDot = document.getElementById(`conn-${agentId}`);
            const evtSource = new EventSource(`${API_BASE}/api/agents/${agentId}/sse`);
            const agent = agents.get(agentId);

            evtSource.onopen = () => {
                connDot.className = 'conn-dot connected';
            };

            evtSource.onmessage = (event) => {
                const bytes = Uint8Array.from(atob(event.data), c => c.charCodeAt(0));
                agent.term.write(bytes);
            };

            evtSource.onerror = () => {
                connDot.className = 'conn-dot disconnected';
                evtSource.close();
                setTimeout(() => connectSSE(agentId), 2000);
            };

            agent.evtSource = evtSource;

            // Forward all keystrokes from xterm.js directly to the PTY.
            // This handles Enter, arrows, Tab, Escape, Ctrl combos, etc.
            agent.term.onData((data) => {
                fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_bytes: Array.from(new TextEncoder().encode(data)) }),
                });
            });
        }

        function setupControls(agentId) {
            const input = document.getElementById(`input-${agentId}`);
            const panel = document.getElementById(`panel-${agentId}`);
            const sendBtn = panel.querySelector('.btn-send');
            const ctrlcBtn = panel.querySelector('.btn-ctrl-c');

            function doSend() {
                const text = input.value;
                if (text) {
                    // Send text, then Enter as separate raw bytes after a
                    // short delay so TUI apps exit bracketed paste mode first.
                    fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text }),
                    }).then(() => {
                        setTimeout(() => {
                            sendRawBytes(agentId, [13]); // \r = Enter
                        }, 100);
                    });
                    input.value = '';
                }
                input.focus();
            }

            function sendRawBytes(agentId, bytes) {
                fetch(`${API_BASE}/api/agents/${agentId}/input`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_bytes: bytes }),
                });
            }

            sendBtn.addEventListener('click', doSend);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); doSend(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 65]); }
                else if (e.key === 'ArrowDown') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 66]); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 67]); }
                else if (e.key === 'ArrowLeft') { e.preventDefault(); sendRawBytes(agentId, [27, 91, 68]); }
                else if (e.key === 'Tab') { e.preventDefault(); sendRawBytes(agentId, [9]); }
                else if (e.key === 'Escape') { e.preventDefault(); sendRawBytes(agentId, [27]); }
            });

            ctrlcBtn.addEventListener('click', () => {
                fetch(`${API_BASE}/api/agents/${agentId}/ctrl-c`, { method: 'POST' });
                input.focus();
            });

            const restartBtn = panel.querySelector('.btn-restart');
            restartBtn.addEventListener('click', async () => {
                restartBtn.textContent = 'Restarting...';
                restartBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}/restart`, { method: 'POST' });
                    if (res.ok) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        agent.term.clear();
                        setTimeout(() => connectSSE(agentId), 1000);
                        restartBtn.textContent = 'Restarted';
                    } else {
                        restartBtn.textContent = 'Failed';
                    }
                } catch (_) {
                    restartBtn.textContent = 'Error';
                }
                setTimeout(() => { restartBtn.textContent = 'Restart'; restartBtn.disabled = false; }, 2000);
            });

            const stopBtn = panel.querySelector('.btn-stop');
            stopBtn.addEventListener('click', async () => {
                stopBtn.textContent = 'Stopping...';
                stopBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}/stop`, { method: 'POST' });
                    if (res.ok) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        stopBtn.textContent = 'Stopped';
                    } else {
                        stopBtn.textContent = 'Failed';
                    }
                } catch (_) {
                    stopBtn.textContent = 'Error';
                }
                setTimeout(() => { stopBtn.textContent = 'Stop'; stopBtn.disabled = false; }, 2000);
            });

            const deleteBtn = panel.querySelector('.btn-delete');
            deleteBtn.addEventListener('click', async () => {
                if (!confirm(`Delete agent "${agentId}"? This will stop the session and remove it.`)) return;
                deleteBtn.textContent = 'Deleting...';
                deleteBtn.disabled = true;
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${agentId}`, { method: 'DELETE' });
                    if (res.ok || res.status === 204) {
                        const agent = agents.get(agentId);
                        if (agent && agent.evtSource) agent.evtSource.close();
                        agents.delete(agentId);
                        panel.remove();
                        refreshDashboardLayout();
                    } else {
                        deleteBtn.textContent = 'Failed';
                        setTimeout(() => { deleteBtn.textContent = 'Delete'; deleteBtn.disabled = false; }, 2000);
                    }
                } catch (_) {
                    deleteBtn.textContent = 'Error';
                    setTimeout(() => { deleteBtn.textContent = 'Delete'; deleteBtn.disabled = false; }, 2000);
                }
            });

            const editCfgBtn = panel.querySelector('.btn-edit-cfg');
            editCfgBtn.addEventListener('click', () => toggleConfig(agentId));
        }

        // Poll agent states every 2 seconds
        async function pollStates() {
            try {
                const res = await fetch(`${API_BASE}/api/agents`);
                if (!res.ok) return;
                const list = await res.json();
                for (const agent of list) {
                    const badge = document.getElementById(`badge-${agent.id}`);
                    if (badge) {
                        const sk = stateKey(agent.state);
                        badge.className = `state-badge state-${sk}`;
                        badge.textContent = stateLabel(agent.state);
                    }
                }
            } catch (_) { /* ignore */ }
        }

        async function pollAgentSagas(agentIds) {
            for (const id of agentIds) {
                try {
                    const res = await fetch(`${API_BASE}/api/agents/${id}/saga`);
                    if (!res.ok) continue;
                    const data = await res.json();
                    const badge = document.getElementById(`saga-badge-${id}`);
                    if (badge && data.saga) {
                        const current = data.steps.find(s => s.status === 'in-progress');
                        badge.textContent = current ? `Step ${current.number}: ${current.slug}` : '';
                    }
                } catch (_) {}
            }
        }

        // Sort agents: coordinator first, then alphabetical.
        function sortAgents(list) {
            return list.sort((a, b) => {
                if (a.role === 'coordinator') return -1;
                if (b.role === 'coordinator') return 1;
                return a.name.localeCompare(b.name);
            });
        }

        async function init() {
            const res = await fetch(`${API_BASE}/api/agents`);
            const agentList = sortAgents(await res.json());

            const dashboard = document.getElementById('dashboard');
            const count = agentList.length;
            document.getElementById('agent-count').textContent = `${count} agent${count !== 1 ? 's' : ''}`;

            // Choose grid columns based on agent count
            if (count <= 1) dashboard.className = 'dashboard cols-1';
            else if (count <= 2) dashboard.className = 'dashboard cols-2';
            else if (count <= 3) dashboard.className = 'dashboard cols-3';
            else dashboard.className = 'dashboard cols-4';

            for (const agent of agentList) {
                const panel = createAgentPanel(agent);
                dashboard.appendChild(panel);

                const { term, fitAddon } = initTerminal(agent.id);
                agents.set(agent.id, { term, fitAddon, panel, evtSource: null });

                connectSSE(agent.id);
                setupControls(agent.id);
            }

            // Fetch per-agent saga step for badges
            pollAgentSagas(agentList.map(a => a.id));

            // Handle resize
            const fitAll = () => agents.forEach((a, id) => {
                a.fitAddon.fit();
                syncPtySize(id, a.term);
            });
            window.addEventListener('resize', fitAll);
            new ResizeObserver(fitAll).observe(dashboard);

            // Poll states
            setInterval(pollStates, 2000);
        }

        init();

        // ── Agent lifecycle controls ──────────────────────

        function toggleNewAgent() {
            const bar = document.getElementById('new-agent-bar');
            bar.classList.toggle('visible');
        }

        async function createAgent() {
            const id = document.getElementById('new-id').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const repoPath = document.getElementById('new-path').value.trim();
            const role = document.getElementById('new-role').value;
            const launch = document.getElementById('new-launch').value.trim();

            if (!id || !name) { alert('Agent ID and Name are required.'); return; }

            const body = {
                id, name,
                repo_path: repoPath || '.',
                role,
                launch_command: launch || 'bash',
            };

            try {
                const res = await fetch(`${API_BASE}/api/agents`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok || res.status === 201) {
                    // Clear form and hide bar.
                    document.getElementById('new-id').value = '';
                    document.getElementById('new-name').value = '';
                    document.getElementById('new-path').value = '';
                    document.getElementById('new-launch').value = 'bash';
                    document.getElementById('new-agent-bar').classList.remove('visible');
                    // Add the new panel.
                    addAgentPanel({ id, name, role, state: { state: 'starting' } });
                } else {
                    const text = await res.text();
                    alert(`Failed to create agent: ${text}`);
                }
            } catch (e) {
                alert(`Error creating agent: ${e}`);
            }
        }

        function addAgentPanel(agent) {
            const dashboard = document.getElementById('dashboard');
            const panel = createAgentPanel(agent);
            dashboard.appendChild(panel);

            const { term, fitAddon } = initTerminal(agent.id);
            agents.set(agent.id, { term, fitAddon, panel, evtSource: null });
            connectSSE(agent.id);
            setupControls(agent.id);
            refreshDashboardLayout();
        }

        function refreshDashboardLayout() {
            const dashboard = document.getElementById('dashboard');
            const count = dashboard.querySelectorAll('.agent-panel').length;
            document.getElementById('agent-count').textContent = `${count} agent${count !== 1 ? 's' : ''}`;
            if (count <= 1) dashboard.className = 'dashboard cols-1';
            else if (count <= 2) dashboard.className = 'dashboard cols-2';
            else if (count <= 3) dashboard.className = 'dashboard cols-3';
            else dashboard.className = 'dashboard cols-4';
            agents.forEach(a => a.fitAddon.fit());
        }

        function toggleConfig(agentId) {
            const editor = document.getElementById(`cfg-${agentId}`);
            editor.classList.toggle('visible');
        }

        async function applyConfig(agentId) {
            const name = document.getElementById(`cfg-name-${agentId}`).value.trim();
            const repoPath = document.getElementById(`cfg-path-${agentId}`).value.trim();
            const role = document.getElementById(`cfg-role-${agentId}`).value;
            const launch = document.getElementById(`cfg-launch-${agentId}`).value.trim();

            const body = {};
            if (name) body.name = name;
            if (repoPath) body.repo_path = repoPath;
            if (role) body.role = role;
            if (launch) body.launch_command = launch;

            try {
                const res = await fetch(`${API_BASE}/api/agents/${agentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok) {
                    toggleConfig(agentId);
                    // Reconnect SSE after restart.
                    const agent = agents.get(agentId);
                    if (agent && agent.evtSource) agent.evtSource.close();
                    agent.term.clear();
                    setTimeout(() => connectSSE(agentId), 1000);
                    // Update header display.
                    const panel = document.getElementById(`panel-${agentId}`);
                    if (name) panel.querySelector('.agent-name').textContent = name;
                    if (role) panel.querySelector('.agent-role').textContent = role;
                } else {
                    alert('Failed to update agent config.');
                }
            } catch (e) {
                alert(`Error updating config: ${e}`);
            }
        }

        async function saveToToml() {
            const btn = document.getElementById('btn-save-toml');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/agents/save`, { method: 'POST' });
                if (res.ok) {
                    btn.textContent = 'Saved!';
                } else {
                    const text = await res.text();
                    btn.textContent = 'Failed';
                    console.error('Save failed:', text);
                }
            } catch (_) {
                btn.textContent = 'Error';
            }
            setTimeout(() => { btn.textContent = 'Save'; btn.disabled = false; }, 2000);
        }

        // ── View switching ─────────────────────────────────
        function switchView(view) {
            document.getElementById('dashboard').style.display = view === 'agents' ? '' : 'none';
            document.getElementById('graph-view').style.display = view === 'graph' ? '' : 'none';
            document.getElementById('saga-view').style.display = view === 'saga' ? '' : 'none';
            document.getElementById('wiki-view').style.display = view === 'wiki' ? '' : 'none';
            document.getElementById('events-view').style.display = view === 'events' ? '' : 'none';
            for (const t of ['agents', 'graph', 'saga', 'wiki', 'events']) {
                document.getElementById('tab-' + t).className = 'view-tab' + (view === t ? ' active' : '');
            }
            if (view === 'graph') graphRefresh();
            if (view === 'saga') sagaRefresh();
            if (view === 'wiki') wikiLoadPageList();
            if (view === 'events') eventsRefresh();
        }

        // ── Wiki state ─────────────────────────────────────
        let wikiCurrentPage = null;
        let wikiCurrentEtag = null;
        let wikiEditing = false;

        async function wikiLoadPageList() {
            try {
                const res = await fetch(`${API_BASE}/api/wiki`);
                const pages = await res.json();
                const list = document.getElementById('wiki-page-list');
                list.innerHTML = '';
                for (const title of pages) {
                    const item = document.createElement('div');
                    item.className = 'wiki-page-item' + (title === wikiCurrentPage ? ' active' : '');
                    item.textContent = title.replace(/__/g, '/');
                    item.onclick = () => wikiOpenPage(title);
                    list.appendChild(item);
                }
            } catch (_) {}
        }

        async function wikiOpenPage(title) {
            wikiEditing = false;
            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(title)}`);
                if (!res.ok) return;
                const data = await res.json();
                wikiCurrentPage = title;
                wikiCurrentEtag = res.headers.get('ETag');

                document.getElementById('wiki-page-title').textContent = data.title;
                document.getElementById('wiki-content').innerHTML = data.html;
                document.getElementById('wiki-content').style.display = '';
                document.getElementById('wiki-edit-area').style.display = 'none';
                document.getElementById('wiki-edit-btn').style.display = '';
                document.getElementById('wiki-save-btn').style.display = 'none';
                document.getElementById('wiki-cancel-btn').style.display = 'none';
                document.getElementById('wiki-conflict').style.display = 'none';
                document.getElementById('wiki-editor').value = data.content;

                // Wire up wiki-link clicks
                document.querySelectorAll('#wiki-content a.wiki-link').forEach(a => {
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const target = a.getAttribute('data-wiki-link');
                        if (target) wikiOpenPage(target);
                    });
                });

                wikiLoadPageList();
            } catch (_) {}
        }

        function wikiToggleEdit() {
            wikiEditing = true;
            document.getElementById('wiki-content').style.display = 'none';
            document.getElementById('wiki-edit-area').style.display = 'flex';
            document.getElementById('wiki-edit-btn').style.display = 'none';
            document.getElementById('wiki-save-btn').style.display = '';
            document.getElementById('wiki-cancel-btn').style.display = '';
        }

        function wikiCancelEdit() {
            wikiEditing = false;
            document.getElementById('wiki-content').style.display = '';
            document.getElementById('wiki-edit-area').style.display = 'none';
            document.getElementById('wiki-edit-btn').style.display = '';
            document.getElementById('wiki-save-btn').style.display = 'none';
            document.getElementById('wiki-cancel-btn').style.display = 'none';
            document.getElementById('wiki-conflict').style.display = 'none';
        }

        async function wikiSave() {
            if (!wikiCurrentPage) return;
            const content = document.getElementById('wiki-editor').value;
            const headers = { 'Content-Type': 'application/json' };
            if (wikiCurrentEtag) headers['If-Match'] = wikiCurrentEtag;

            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(wikiCurrentPage)}`, {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ content }),
                });
                if (res.status === 409) {
                    const data = await res.json();
                    document.getElementById('wiki-conflict').textContent =
                        `Conflict: page was modified by another user. Current version shown below. Your edits are preserved in the editor.`;
                    document.getElementById('wiki-conflict').style.display = '';
                    wikiCurrentEtag = data.current_etag;
                    return;
                }
                if (res.ok) {
                    wikiCurrentEtag = res.headers.get('ETag');
                    wikiOpenPage(wikiCurrentPage);
                }
            } catch (_) {}
        }

        async function wikiNewPage() {
            const input = document.getElementById('wiki-new-title');
            const title = input.value.trim();
            if (!title) return;

            try {
                const res = await fetch(`${API_BASE}/api/wiki/${encodeURIComponent(title)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `# ${title}\n\n` }),
                });
                if (res.ok || res.status === 201) {
                    input.value = '';
                    wikiOpenPage(title);
                }
            } catch (_) {}
        }

        // ── Saga ──────────────────────────────────────────────
        let sagaCurrentTaskType = null;

        async function sagaRefresh() {
            const grid = document.getElementById('saga-grid');
            try {
                // Fetch agent list
                const agentRes = await fetch(`${API_BASE}/api/agents`);
                if (!agentRes.ok) return;
                const agentList = await agentRes.json();

                // Fetch per-agent sagas in parallel
                const sagaResults = await Promise.all(
                    agentList.map(async (agent) => {
                        try {
                            const res = await fetch(`${API_BASE}/api/agents/${agent.id}/saga`);
                            if (!res.ok) return { agent, data: null };
                            const data = await res.json();
                            return { agent, data };
                        } catch (_) {
                            return { agent, data: null };
                        }
                    })
                );

                // Filter to agents that have a saga, coordinator first
                const withSagas = sagaResults
                    .filter(r => r.data && r.data.saga)
                    .sort((a, b) => {
                        if (a.agent.role === 'coordinator') return -1;
                        if (b.agent.role === 'coordinator') return 1;
                        return a.agent.name.localeCompare(b.agent.name);
                    });

                if (withSagas.length === 0) {
                    grid.className = 'saga-grid saga-cols-1';
                    grid.innerHTML = '<div class="saga-none">No agent sagas found. Each agent needs a .agentrail/ directory in its repo_path.</div>';
                    return;
                }

                const cols = Math.min(withSagas.length, 4);
                grid.className = `saga-grid saga-cols-${cols}`;
                grid.innerHTML = '';

                for (const { agent, data } of withSagas) {
                    const panel = renderSagaPanel(agent, data);
                    grid.appendChild(panel);
                }
            } catch (_) {
                grid.innerHTML = '<div class="saga-none">Failed to load sagas.</div>';
            }
        }

        function renderSagaPanel(agent, data) {
            const panel = document.createElement('div');
            panel.className = 'saga-panel';

            const saga = data.saga;
            const steps = data.steps;
            const completed = steps.filter(s => s.status === 'completed').length;
            const total = steps.length;
            const current = steps.find(s => s.status === 'in-progress');
            const statusCls = saga.status === 'completed' ? 'saga-completed' : 'saga-active';

            let html = `
                <div class="saga-panel-header">
                    <span class="saga-agent-name">${agent.name}</span>
                    <span class="saga-agent-role">${agent.role}</span>
                    <span class="spacer"></span>
                    <span class="saga-status-badge ${statusCls}">${saga.status}</span>
                </div>
                <div class="saga-panel-body">
                    <div class="saga-info">
                        <div class="saga-stat"><div class="saga-stat-label">Saga</div><div class="saga-stat-value">${saga.name}</div></div>
                        <div class="saga-stat"><div class="saga-stat-label">Progress</div><div class="saga-stat-value">${completed} / ${total}</div></div>
                        <div class="saga-stat"><div class="saga-stat-label">Current</div><div class="saga-stat-value">${current ? current.slug : 'none'}</div></div>
                    </div>
                    <div class="saga-steps">`;

            for (const step of steps) {
                const sCls = 'step-' + step.status.replace(/_/g, '-');
                const isCurrent = step.status === 'in-progress';
                const desc = step.description.length > 100 ? step.description.slice(0, 100) + '...' : step.description;
                html += `
                        <div class="step-card ${sCls}${isCurrent ? ' step-current' : ''}">
                            <div class="step-number">${step.number}</div>
                            <div class="step-body">
                                <div class="step-header">
                                    <span class="step-slug">${step.slug}</span>
                                    <span class="step-status">${step.status}</span>
                                </div>
                                <div class="step-desc">${desc}</div>
                                <div class="step-meta">
                                    ${step.task_type ? `<span>Task: ${step.task_type}</span>` : ''}
                                    ${step.completed_at ? `<span>Done: ${step.completed_at}</span>` : ''}
                                </div>
                            </div>
                        </div>`;
            }

            html += '</div>'; // close saga-steps

            // Trajectories
            if (data.trajectories.length > 0) {
                html += `<div class="saga-trajectories">
                    <h3>Trajectories</h3>`;
                for (const t of data.trajectories) {
                    const rewardCls = t.reward > 0 ? 'traj-reward-pos' : (t.reward < 0 ? 'traj-reward-neg' : 'traj-reward-zero');
                    html += `
                    <div class="traj-card">
                        <div class="traj-action">${t.action}</div>
                        <div class="traj-meta">
                            <span class="${rewardCls}">Reward: ${t.reward > 0 ? '+' : ''}${t.reward}</span>
                            &middot; ${t.result} &middot; ${t.timestamp}
                        </div>
                    </div>`;
                }
                html += '</div>'; // close saga-trajectories
            }

            html += '</div>'; // close saga-panel-body
            panel.innerHTML = html;
            return panel;
        }

        async function sagaDistill() {
            if (!sagaCurrentTaskType) return;
            const btn = document.getElementById('saga-distill-btn');
            btn.textContent = 'Distilling...';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/saga/distill`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_type: sagaCurrentTaskType }),
                });
                const data = await res.json();
                if (data.exit_code === 0) {
                    btn.textContent = 'Distilled!';
                } else {
                    btn.textContent = 'Distill Failed';
                }
            } catch (_) {
                btn.textContent = 'Error';
            }
            setTimeout(() => { btn.textContent = 'Distill Skill'; btn.disabled = false; }, 3000);
        }

        // ── Events log ────────────────────────────────────────
        let eventsLastIndex = 0;

        const KIND_LABELS = {
            feature_request: 'Feature Request',
            bug_fix_request: 'Bug Fix',
            completion_notice: 'Completed',
            blocked_notice: 'Blocked',
            needs_info: 'Needs Info',
            verification_request: 'Verify',
        };

        function kindLabel(kind) { return KIND_LABELS[kind] || kind; }

        function decisionClass(decision) {
            if (decision.startsWith('deliver')) return 'decision-deliver';
            if (decision.startsWith('escalate')) return 'decision-escalate';
            return 'decision-broadcast';
        }

        function decisionLabel(decision) {
            if (decision.startsWith('deliver:')) return 'Delivered to ' + decision.slice(8);
            if (decision.startsWith('escalate:')) return 'Escalated: ' + decision.slice(9);
            return 'Broadcast';
        }

        async function eventsRefresh() {
            try {
                const res = await fetch(`${API_BASE}/api/events?since=0`);
                if (!res.ok) return;
                const entries = await res.json();
                const outbound = document.getElementById('events-outbound');
                const inbound = document.getElementById('events-inbound');
                const escDiv = document.getElementById('events-escalations');
                outbound.innerHTML = '';
                inbound.innerHTML = '';
                escDiv.innerHTML = '';

                // Show escalations at the top
                const escalations = entries.filter(e => e.decision.startsWith('escalate'));
                for (const esc of escalations) {
                    const banner = document.createElement('div');
                    banner.className = 'escalation-banner';
                    banner.innerHTML = `<span class="esc-icon">!</span>
                        <span><strong>Human attention needed:</strong> ${esc.event.summary}
                        (from ${esc.event.source_agent}, target: ${esc.event.target_agent || 'none'}) &mdash; ${esc.decision.slice(9)}</span>`;
                    escDiv.appendChild(banner);
                }

                // Split events into outbound (to non-coordinator) and inbound (to coordinator)
                for (let i = entries.length - 1; i >= 0; i--) {
                    const entry = entries[i];
                    const ev = entry.event;
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-header">
                            <span class="event-kind kind-${ev.kind}">${kindLabel(ev.kind)}</span>
                            <span class="event-decision ${decisionClass(entry.decision)}">${decisionLabel(entry.decision)}</span>
                        </div>
                        <div class="event-summary">${ev.summary}</div>
                        <div class="event-meta">
                            <span>From: ${ev.source_agent}</span>
                            <span>Target: ${ev.target_agent || '(broadcast)'}</span>
                            <span>${entry.logged_at.slice(11, 19)}</span>
                        </div>`;
                    const isInbound = ev.target_agent === 'coordinator';
                    (isInbound ? inbound : outbound).appendChild(card);
                }
                eventsLastIndex = entries.length;
            } catch (_) {}
        }

        // Poll events every 5 seconds for new escalations (shown as badge on tab)
        let eventsPollCount = 0;
        setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/api/events?since=${eventsLastIndex}`);
                if (!res.ok) return;
                const entries = await res.json();
                if (entries.length > 0) {
                    eventsPollCount += entries.length;
                    eventsLastIndex += entries.length;
                    const tab = document.getElementById('tab-events');
                    const hasEscalation = entries.some(e => e.decision.startsWith('escalate'));
                    if (hasEscalation) {
                        tab.style.borderColor = '#e94560';
                        tab.style.color = '#e94560';
                        playNotification();
                    }
                    // If events view is active, refresh it
                    if (document.getElementById('events-view').style.display !== 'none') {
                        eventsRefresh();
                    }
                }
            } catch (_) {}
        }, 5000);

        // ── Dependency graph ─────────────────────────────────
        const STATE_COLORS = {
            starting: '#9ca3af', running: '#34d399', idle: '#60a5fa',
            awaiting_human_input: '#fbbf24', busy: '#a78bfa', blocked: '#fca5a5',
            completed_task: '#6ee7b7', error: '#f87171', disconnected: '#6b7280',
        };
        const STATE_BG = {
            starting: '#1f2937', running: '#064e3b', idle: '#1e3a5f',
            awaiting_human_input: '#78350f', busy: '#4c1d95', blocked: '#7f1d1d',
            completed_task: '#064e3b', error: '#7f1d1d', disconnected: '#1f2937',
        };

        async function graphRefresh() {
            try {
                const res = await fetch(`${API_BASE}/api/agents/graph`);
                if (!res.ok) return;
                const nodes = await res.json();
                renderGraph(nodes);
            } catch (_) {}
        }

        function renderGraph(nodes) {
            const canvas = document.getElementById('graph-canvas');
            if (nodes.length === 0) {
                canvas.innerHTML = '<div style="color:#666;font-size:14px;">No agents running.</div>';
                return;
            }

            // Sort: coordinator first
            nodes.sort((a, b) => {
                if (a.role === 'coordinator') return -1;
                if (b.role === 'coordinator') return 1;
                return a.name.localeCompare(b.name);
            });

            const coordinator = nodes.find(n => n.role === 'coordinator');
            const others = nodes.filter(n => n.role !== 'coordinator');

            const nodeW = 180, nodeH = 50, padX = 60, padY = 50;
            // Hub layout: coordinator on left, others stacked on right
            const svgW = coordinator ? (nodeW + padX) * 2 + padX * 2 : (nodes.length * (nodeW + padX) + padX);
            const svgH = Math.max(others.length, 1) * (nodeH + padY) + padY;

            const positions = {};
            if (coordinator) {
                // Coordinator centered vertically on left
                positions[coordinator.id] = {
                    x: padX,
                    y: (svgH - nodeH) / 2,
                };
                // Others stacked on right
                others.forEach((n, i) => {
                    positions[n.id] = {
                        x: padX * 2 + nodeW + padX,
                        y: padY + i * (nodeH + padY),
                    };
                });
            } else {
                nodes.forEach((n, i) => {
                    positions[n.id] = { x: padX, y: padY + i * (nodeH + padY) };
                });
            }

            let svg = `<svg class="graph-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560" /></marker></defs>`;

            // Draw edges: coordinator → each other agent (bidirectional)
            if (coordinator) {
                const cp = positions[coordinator.id];
                for (const other of others) {
                    const op = positions[other.id];
                    // Outbound: coordinator right edge → other left edge
                    svg += `<line class="graph-edge" x1="${cp.x + nodeW}" y1="${cp.y + nodeH / 2}" x2="${op.x}" y2="${op.y + nodeH / 2}" marker-end="url(#arrowhead)" />`;
                }
            }

            // Also draw any explicit blocked_on edges
            for (const node of nodes) {
                const to = positions[node.id];
                if (!to) continue;
                for (const dep of node.blocked_on) {
                    const from = positions[dep];
                    if (!from) continue;
                    svg += `<line class="graph-edge" x1="${from.x + nodeW / 2}" y1="${from.y + nodeH}" x2="${to.x + nodeW / 2}" y2="${to.y}" marker-end="url(#arrowhead)" />`;
                }
            }

            // Draw nodes
            for (const node of nodes) {
                const pos = positions[node.id];
                const color = STATE_COLORS[node.state] || '#888';
                const bg = STATE_BG[node.state] || '#16213e';
                const isCoord = node.role === 'coordinator';
                const stroke = isCoord ? '#e94560' : color;
                const strokeW = isCoord ? 2 : 1;
                svg += `<g class="graph-node">`;
                svg += `<rect x="${pos.x}" y="${pos.y}" width="${nodeW}" height="${nodeH}" fill="${bg}" stroke="${stroke}" stroke-width="${strokeW}" rx="4" />`;
                svg += `<text x="${pos.x + nodeW / 2}" y="${pos.y + 20}" text-anchor="middle" font-weight="600">${node.name}</text>`;
                svg += `<text x="${pos.x + nodeW / 2}" y="${pos.y + 38}" text-anchor="middle" font-size="11" fill="${color}">${stateLabel({state: node.state})}</text>`;
                svg += `</g>`;
            }

            svg += `</svg>`;
            canvas.innerHTML = svg;
        }

        // ── Notification sounds ──────────────────────────────
        // Use Web Audio API to generate a short attention tone (no external files needed).
        let audioCtx = null;
        let notificationsEnabled = true;
        const prevAgentStates = new Map();

        function playNotification() {
            if (!notificationsEnabled) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch (_) {}
        }

        // Check for state changes that need attention during polling.
        const origPollStates = pollStates;
        pollStates = async function() {
            try {
                const res = await fetch(`${API_BASE}/api/agents`);
                if (!res.ok) return;
                const list = await res.json();
                for (const agent of list) {
                    const sk = stateKey(agent.state);
                    const badge = document.getElementById(`badge-${agent.id}`);
                    if (badge) {
                        badge.className = `state-badge state-${sk}`;
                        badge.textContent = stateLabel(agent.state);
                    }
                    // Play notification on attention-needing state transitions.
                    const prev = prevAgentStates.get(agent.id);
                    if (prev && prev !== sk && (sk === 'awaiting_human_input' || sk === 'error' || sk === 'blocked')) {
                        playNotification();
                    }
                    prevAgentStates.set(agent.id, sk);
                }
            } catch (_) {}
        };
    </script>
</body>
</html>
