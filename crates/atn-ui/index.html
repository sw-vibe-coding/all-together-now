<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Together Now</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <link data-trunk rel="rust" data-wasm-opt="z"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
        .agent-label { font-size: 14px; color: #aaa; }
        .status { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: #0f3460; color: #4ecca3; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .panel { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 8px; min-height: 0; }
        #terminal-container { flex: 1; min-height: 0; border-radius: 6px; overflow: hidden; background: #000; }
        .controls { display: flex; gap: 8px; align-items: center; }
        .controls input { flex: 1; padding: 8px 12px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 14px; outline: none; }
        .controls input:focus { border-color: #e94560; }
        .controls button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-send { background: #4ecca3; color: #1a1a2e; }
        .btn-send:hover { background: #3db892; }
        .btn-ctrl-c { background: #e94560; color: #fff; }
        .btn-ctrl-c:hover { background: #d63851; }

        .btn-new-agent { padding:6px 12px; border:1px solid #4ecca3; border-radius:4px; background:transparent; color:#4ecca3; cursor:pointer; font-size:13px; }
        .btn-new-agent:hover { background:#4ecca3; color:#0b0b14; }
        .empty-state { max-width:560px; margin:64px auto; padding:32px; text-align:center; }
        .empty-state h2 { color:#e0e0e0; margin-bottom:12px; }
        .empty-state p { color:#a0a0b0; line-height:1.5; margin-bottom:20px; }
        .btn-new-agent-primary { padding:10px 22px; border:none; border-radius:6px; background:#4ecca3; color:#0b0b14; font-weight:600; font-size:14px; cursor:pointer; }
        .btn-new-agent-primary:hover { background:#3db892; }

        .dialog-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
        .dialog { background:#16213e; border:1px solid #0f3460; border-radius:8px; padding:24px; min-width:520px; max-width:90vw; max-height:90vh; overflow:auto; }
        .dialog h2 { color:#e94560; margin-bottom:16px; }
        .form-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .form-row label { color:#a0a0b0; font-size:12px; width:90px; }
        .form-row input, .form-row select { flex:1; padding:6px 10px; background:#0d1117; border:1px solid #0f3460; border-radius:4px; color:#e0e0e0; font-size:13px; outline:none; }
        .form-row input:focus, .form-row select:focus { border-color:#e94560; }
        .form-row input:disabled { opacity:0.4; }
        .form-preview { padding:10px; background:#0d1117; border:1px solid #0f3460; border-radius:4px; margin:12px 0; }
        .form-preview code { color:#4ecca3; font-family:monospace; font-size:12px; word-break:break-all; }
        .form-error { color:#fca5a5; font-size:12px; margin-bottom:8px; }
        .form-missing { color:#fcd34d; font-size:12px; margin-bottom:8px; }
        .form-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
        .form-actions button { padding:8px 16px; border-radius:4px; border:none; cursor:pointer; font-size:13px; }
        .form-actions .btn-cancel { background:transparent; color:#a0a0b0; border:1px solid #0f3460; }
        .form-actions .btn-create { background:#4ecca3; color:#0b0b14; font-weight:600; }
        .form-actions .btn-create:disabled { opacity:0.4; cursor:not-allowed; }
    </style>
</head>
<body></body>
</html>
